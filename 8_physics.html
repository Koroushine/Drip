<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drip - Class 8 Physics Formulas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #6C5CE7;
            --physics-color: #FF6B6B;
            --physics-light: #FF8E8E;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            --radius: 20px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1035 30%, #0d1a2d 60%, #150a20 100%);
            min-height: 100vh;
            color: white;
            position: relative;
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(255, 107, 107, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 107, 107, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 107, 107, 0.25), transparent 70%);
            top: -150px;
            right: -150px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 142, 142, 0.2), transparent 70%);
            bottom: -100px;
            left: -100px;
        }

        .main-container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            padding: 30px 24px 50px;
            max-width: 1500px;
            margin: 0 auto;
        }

        /* Navigation Bar */
        .nav-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-btn {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn:hover {
            background: rgba(255, 107, 107, 0.3);
            transform: translateX(-4px);
            box-shadow: 0 8px 24px rgba(255, 107, 107, 0.3);
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.7);
        }

        .breadcrumb span {
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: color 0.3s;
        }

        .breadcrumb span:hover {
            color: white;
        }

        .breadcrumb .current {
            color: #FF6B6B;
            font-weight: 600;
        }

        .class-badge {
            background: linear-gradient(135deg, #FF6B6B, #FF8E8E);
            padding: 8px 20px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 14px;
            margin-left: auto;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        /* Header */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-header h1 {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #FF8E8E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .page-header .subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 3px;
        }

        /* Search and Sort Bar */
        .controls-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .search-wrapper {
            flex: 1;
            min-width: 280px;
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 18px;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            border-radius: 16px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1.5px solid var(--glass-border);
            color: white;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .search-input:focus {
            border-color: rgba(255, 107, 107, 0.6);
            box-shadow: 0 8px 30px rgba(255, 107, 107, 0.2);
            background: rgba(255, 255, 255, 0.12);
        }

        .sort-btn {
            padding: 16px 24px;
            border-radius: 16px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1.5px solid var(--glass-border);
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            white-space: nowrap;
        }

        .sort-btn:hover {
            background: rgba(255, 107, 107, 0.2);
            border-color: rgba(255, 107, 107, 0.5);
            box-shadow: 0 8px 24px rgba(255, 107, 107, 0.2);
        }

        .sort-btn.active {
            background: rgba(255, 107, 107, 0.3);
            border-color: rgba(255, 107, 107, 0.7);
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }

        .stat-card {
            padding: 14px 22px;
            border-radius: 14px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .stat-card i {
            color: #FF6B6B;
            font-size: 18px;
        }

        .stat-card .count {
            font-weight: 700;
            color: #FF8E8E;
            font-size: 18px;
        }

        /* Chapter Sections */
        .formulas-container {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .chapter-section {
            animation: fadeInUp 0.6s ease-out both;
        }

        .chapter-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
            padding: 16px 24px;
            border-radius: 18px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.3s;
        }

        .chapter-header:hover {
            background: rgba(255, 107, 107, 0.15);
            border-color: rgba(255, 107, 107, 0.4);
        }

        .chapter-icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: linear-gradient(135deg, #FF6B6B, #FF8E8E);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
        }

        .chapter-info {
            flex: 1;
        }

        .chapter-name {
            font-size: 20px;
            font-weight: 700;
            color: white;
        }

        .chapter-count {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }

        .chapter-toggle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            transition: transform 0.3s;
        }

        .chapter-section.collapsed .chapter-toggle {
            transform: rotate(-90deg);
        }

        .chapter-section.collapsed .formulas-grid {
            display: none;
        }

        /* Formulas Grid */
        .formulas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
            padding: 0 8px;
        }

        .formula-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 22px;
            transition: all 0.3s;
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .formula-card:hover {
            background: rgba(255, 107, 107, 0.12);
            border-color: rgba(255, 107, 107, 0.4);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 107, 107, 0.15);
        }

        .formula-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #FF6B6B, #FF8E8E);
            border-radius: 4px 0 0 4px;
        }

        .formula-name {
            font-size: 15px;
            font-weight: 700;
            color: #FF8E8E;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .formula-expression {
            font-size: 20px;
            font-weight: 800;
            color: white;
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 16px;
            border-radius: 10px;
            letter-spacing: 1px;
        }

        .formula-desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.5;
        }

        .formula-tags {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .formula-tag {
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 11px;
            background: rgba(255, 107, 107, 0.2);
            color: #FF8E8E;
            font-weight: 600;
        }

        /* No results */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .no-results i {
            font-size: 48px;
            margin-bottom: 16px;
            color: rgba(255, 107, 107, 0.4);
        }

        .no-results h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        /* Highlight search match */
        .highlight {
            background: rgba(255, 107, 107, 0.4);
            padding: 2px 4px;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .formulas-grid {
                grid-template-columns: 1fr;
            }
            
            .page-header h1 {
                font-size: 32px;
            }
            
            .controls-bar {
                flex-direction: column;
            }
            
            .search-wrapper {
                min-width: 100%;
            }
            
            .sort-btn {
                justify-content: center;
            }
        }

        @media (max-width: 500px) {
            .main-container {
                padding: 16px 10px 40px;
            }
            
            .formula-card {
                padding: 16px;
            }
            
            .formula-expression {
                font-size: 16px;
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="main-container">
        <!-- Navigation Bar -->
        <div class="nav-bar">
            <button class="back-btn" onclick="goBack()" title="Back to Subjects">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="breadcrumb">
                <span onclick="goHome()">Home</span>
                <i class="fas fa-chevron-right" style="font-size: 12px;"></i>
                <span onclick="goBack()">Class 8</span>
                <i class="fas fa-chevron-right" style="font-size: 12px;"></i>
                <span class="current">Physics</span>
            </div>
            <div class="class-badge">
                <i class="fas fa-bolt"></i> Physics Formulas
            </div>
        </div>

        <!-- Page Header -->
        <div class="page-header">
            <h1>⚡ Class 8 Physics Formulas</h1>
            <p class="subtitle">✦ 300+ Essential Formulas ✦</p>
        </div>

        <!-- Search and Sort Controls -->
        <div class="controls-bar">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="Search formulas, topics, or keywords... (e.g., force, pressure, ohm)" oninput="filterFormulas()">
            </div>
            <button class="sort-btn" id="sortBtn" onclick="toggleSort()">
                <i class="fas fa-sort-alpha-down"></i>
                <span id="sortLabel">Sort: By Chapter</span>
            </button>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-card">
                <i class="fas fa-calculator"></i>
                <span>Total Formulas:</span>
                <span class="count" id="totalCount">312</span>
            </div>
            <div class="stat-card">
                <i class="fas fa-book"></i>
                <span>Chapters:</span>
                <span class="count">10</span>
            </div>
            <div class="stat-card" id="visibleCountCard">
                <i class="fas fa-eye"></i>
                <span>Showing:</span>
                <span class="count" id="visibleCount">312</span>
            </div>
        </div>

        <!-- Formulas Container -->
        <div class="formulas-container" id="formulasContainer">
            <!-- Dynamically filled by JavaScript -->
        </div>

        <!-- No Results -->
        <div class="no-results" id="noResults" style="display: none;">
            <i class="fas fa-search"></i>
            <h3>No formulas found</h3>
            <p>Try a different search term</p>
        </div>
    </div>

    <script>
        // Complete formula database organized by chapters
        const formulaData = [
            {
                chapter: "Force and Pressure",
                icon: "fa-hand-fist",
                formulas: [
                    { name: "Force Formula", expr: "F = m × a", desc: "Force equals mass times acceleration. SI unit: Newton (N)", tags: ["force", "mass", "acceleration", "newton"] },
                    { name: "Weight Formula", expr: "W = m × g", desc: "Weight is the force of gravity on an object. g = 9.8 m/s² on Earth", tags: ["weight", "gravity", "mass"] },

            {

                    { name: "Mass of Earth", expr: "M = gR²/G", desc: "Calculating Earth's mass from g, R, and G", tags: ["earth", "mass", "calculate"] },
                    { name: "Density of Earth", expr: "ρ = 3g/(4πGR)", desc: "Average density of Earth from g, R, and G", tags: ["density", "earth", "average"] },

                    { name: "Stefan-Boltzmann Law", expr: "P = εσAT⁴", desc: "Radiated power. σ = 5.67×10⁻⁸ W/(m²K⁴)", tags: ["stefan", "boltzmann", "radiation"] },
                    { name: "Wien's Displacement Law", expr: "λ_max = b/T", desc: "Peak wavelength inversely proportional to temperature. b = 2.9×10⁻³ m·K", tags: ["wien", "displacement", "wavelength"] }

            }
        ];

        let currentSort = 'chapter'; // 'chapter' or 'alphabetical'
        let collapsedChapters = new Set();

        // Render all formulas
        function renderFormulas(data) {
            const container = document.getElementById('formulasContainer');
            container.innerHTML = '';

            data.forEach((chapter, chapterIndex) => {
                const section = document.createElement('div');
                section.className = 'chapter-section';
                if (collapsedChapters.has(chapterIndex)) {
                    section.classList.add('collapsed');
                }

                section.innerHTML = `
                    <div class="chapter-header" onclick="toggleChapter(${chapterIndex})">
                        <div class="chapter-icon">
                            <i class="fas ${chapter.icon}"></i>
                        </div>
                        <div class="chapter-info">
                            <div class="chapter-name">${chapter.chapter}</div>
                            <div class="chapter-count">${chapter.formulas.length} formulas</div>
                        </div>
                        <i class="fas fa-chevron-down chapter-toggle"></i>
                    </div>
                    <div class="formulas-grid">
                        ${chapter.formulas.map((formula, fIndex) => `
                            <div class="formula-card" data-chapter="${chapterIndex}" data-name="${formula.name.toLowerCase()}" data-tags="${formula.tags.join(' ')}" data-expr="${formula.expr.toLowerCase()}">
                                <div class="formula-name">${formula.name}</div>
                                <div class="formula-expression">${formula.expr}</div>
                                <div class="formula-desc">${formula.desc}</div>
                                <div class="formula-tags">
                                    ${formula.tags.map(tag => `<span class="formula-tag">#${tag}</span>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;

                container.appendChild(section);
            });

            updateVisibleCount();
        }

        // Toggle chapter collapse
        function toggleChapter(index) {
            if (collapsedChapters.has(index)) {
                collapsedChapters.delete(index);
            } else {
                collapsedChapters.add(index);
            }
            
            const sections = document.querySelectorAll('.chapter-section');
            if (sections[index]) {
                sections[index].classList.toggle('collapsed');
            }
        }

        // Filter formulas based on search
        function filterFormulas() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.formula-card');
            const sections = document.querySelectorAll('.chapter-section');
            let visibleCount = 0;

            sections.forEach(section => {
                let chapterHasVisible = false;
                const sectionCards = section.querySelectorAll('.formula-card');
                
                sectionCards.forEach(card => {
                    const name = card.dataset.name;
                    const tags = card.dataset.tags;
                    const expr = card.dataset.expr;
                    
                    if (searchTerm === '' || 
                        name.includes(searchTerm) || 
                        tags.includes(searchTerm) || 
                        expr.includes(searchTerm)) {
                        card.style.display = '';
                        chapterHasVisible = true;
                        visibleCount++;
                    } else {
                        card.style.display = 'none';
                    }
                });

                // Show/hide chapter section
                if (searchTerm === '') {
                    section.style.display = '';
                    if (collapsedChapters.has(parseInt(section.querySelector('.formula-card')?.dataset.chapter))) {
                        section.classList.add('collapsed');
                    }
                } else {
                    section.style.display = chapterHasVisible ? '' : 'none';
                    if (chapterHasVisible) {
                        section.classList.remove('collapsed');
                    }
                }
            });

            // Update counts
            document.getElementById('visibleCount').textContent = visibleCount;
            document.getElementById('totalCount').textContent = getAllFormulasCount();
            
            // Show/hide no results
            document.getElementById('noResults').style.display = visibleCount === 0 ? 'block' : 'none';
        }

        // Get total formula count
        function getAllFormulasCount() {
            return formulaData.reduce((total, chapter) => total + chapter.formulas.length, 0);
        }

        // Update visible count
        function updateVisibleCount() {
            const visibleCards = document.querySelectorAll('.formula-card[style*="display: none"]').length;
            const total = getAllFormulasCount();
            document.getElementById('visibleCount').textContent = total - visibleCards;
            document.getElementById('totalCount').textContent = total;
        }

        // Toggle sort
        function toggleSort() {
            const btn = document.getElementById('sortBtn');
            const label = document.getElementById('sortLabel');
            
            if (currentSort === 'chapter') {
                currentSort = 'alphabetical';
                btn.classList.add('active');
                label.textContent = 'Sort: A to Z';
                sortAlphabetically();
            } else {
                currentSort = 'chapter';
                btn.classList.remove('active');
                label.textContent = 'Sort: By Chapter';
                renderFormulas(formulaData);
                // Re-apply search filter
                if (document.getElementById('searchInput').value.trim() !== '') {
                    filterFormulas();
                }
            }
        }

        // Sort formulas alphabetically
        function sortAlphabetically() {
            // Flatten all formulas with their chapter info
            let allFormulas = [];
            formulaData.forEach(chapter => {
                chapter.formulas.forEach(formula => {
                    allFormulas.push({
                        ...formula,
                        chapterName: chapter.chapter,
                        chapterIcon: chapter.icon
                    });
                });
            });

            // Sort alphabetically
            allFormulas.sort((a, b) => a.name.localeCompare(b.name));

            // Create a single "All Formulas" chapter
            const container = document.getElementById('formulasContainer');
            container.innerHTML = `
                <div class="chapter-section">
                    <div class="chapter-header" onclick="toggleChapter(0)">
                        <div class="chapter-icon">
                            <i class="fas fa-sort-alpha-down"></i>
                        </div>
                        <div class="chapter-info">
                            <div class="chapter-name">All Formulas (A-Z)</div>
                            <div class="chapter-count">${allFormulas.length} formulas</div>
                        </div>
                        <i class="fas fa-chevron-down chapter-toggle"></i>
                    </div>
                    <div class="formulas-grid">
                        ${allFormulas.map((formula, index) => `
                            <div class="formula-card" data-chapter="0" data-name="${formula.name.toLowerCase()}" data-tags="${formula.tags.join(' ')}" data-expr="${formula.expr.toLowerCase()}">
                                <div class="formula-name">${formula.name} <span style="font-size:11px;color:#FF8E8E;">(${formula.chapterName})</span></div>
                                <div class="formula-expression">${formula.expr}</div>
                                <div class="formula-desc">${formula.desc}</div>
                                <div class="formula-tags">
                                    ${formula.tags.map(tag => `<span class="formula-tag">#${tag}</span>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            updateVisibleCount();
        }

        // Navigation
        function goBack() {
            document.body.style.transition = 'opacity 0.4s';
            document.body.style.opacity = '0';
            setTimeout(() => {
                window.location.href = '8_learning.html';
            }, 400);
        }

        function goHome() {
            document.body.style.transition = 'opacity 0.4s';
            document.body.style.opacity = '0';
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 400);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'f') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });

        // Initialize
        window.addEventListener('load', () => {
            renderFormulas(formulaData);
            document.getElementById('totalCount').textContent = getAllFormulasCount();
            document.getElementById('visibleCount').textContent = getAllFormulasCount();

            // Focus search on '/' key
            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && document.activeElement !== document.getElementById('searchInput')) {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
            });
        });
    </script>
</body>
