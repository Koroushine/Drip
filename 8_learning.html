<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drip - Class 8 Subjects</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #6C5CE7;
            --primary-light: #A29BFE;
            --secondary: #00CEC9;
            --accent: #FD79A8;
            --science-color: #6C5CE7;
            --social-color: #00CEC9;
            --physics-color: #FF6B6B;
            --chemistry-color: #4ECDC4;
            --biology-color: #45B7AA;
            --history-color: #FFA07A;
            --geography-color: #87CEEB;
            --political-color: #DDA0DD;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            --shadow-hover: 0 20px 60px rgba(0, 0, 0, 0.3);
            --radius: 24px;
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1035 30%, #0d1a2d 60%, #150a20 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            color: white;
        }

        /* Background Effects */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(108, 92, 231, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108, 92, 231, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 25s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(108, 92, 231, 0.3), transparent 70%);
            top: -100px;
            right: -100px;
            animation: orbFloat 12s ease-in-out infinite;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(0, 206, 201, 0.3), transparent 70%);
            bottom: -100px;
            left: -100px;
            animation: orbFloat 12s ease-in-out infinite reverse;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, -50px) scale(1.2); }
        }

        /* Main Container */
        .main-container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            padding: 30px 24px 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Navigation Bar */
        .nav-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
            flex-wrap: wrap;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-btn {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-4px);
            box-shadow: 0 8px 24px rgba(108, 92, 231, 0.3);
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.7);
        }

        .breadcrumb span {
            color: rgba(255, 255, 255, 0.5);
        }

        .breadcrumb .current {
            color: white;
            font-weight: 600;
        }

        .class-badge {
            background: linear-gradient(135deg, #6C5CE7, #A29BFE);
            padding: 8px 20px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 14px;
            margin-left: auto;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4); }
            50% { box-shadow: 0 8px 30px rgba(108, 92, 231, 0.7); }
        }

        /* Page Header */
        .page-header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-header h1 {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #A29BFE);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .page-header .subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 3px;
        }

        /* Subject Cards Grid */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 32px;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        /* Subject Card */
        .subject-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1.5px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 40px 32px;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }

        .subject-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            transition: all 0.5s;
        }

        .subject-card.science::before {
            background: linear-gradient(90deg, #6C5CE7, #A29BFE, #6C5CE7);
            background-size: 200% 100%;
            animation: gradientSlide 3s linear infinite;
        }

        .subject-card.social::before {
            background: linear-gradient(90deg, #00CEC9, #00B894, #00CEC9);
            background-size: 200% 100%;
            animation: gradientSlide 3s linear infinite;
        }

        @keyframes gradientSlide {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .subject-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .subject-icon {
            width: 80px;
            height: 80px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            color: white;
            transition: all 0.4s;
        }

        .subject-card.science .subject-icon {
            background: linear-gradient(135deg, #6C5CE7, #A29BFE);
            box-shadow: 0 8px 24px rgba(108, 92, 231, 0.5);
        }

        .subject-card.social .subject-icon {
            background: linear-gradient(135deg, #00CEC9, #00B894);
            box-shadow: 0 8px 24px rgba(0, 206, 201, 0.5);
        }

        .subject-title {
            font-size: 32px;
            font-weight: 800;
        }

        .subject-card.science .subject-title {
            color: #A29BFE;
        }

        .subject-card.social .subject-title {
            color: #00CEC9;
        }

        /* Branch Buttons */
        .branches-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }

        .branch-btn {
            padding: 18px 16px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: 600;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .branch-btn i {
            font-size: 28px;
            transition: all 0.3s;
        }

        .branch-btn:hover {
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }

        .branch-btn:hover i {
            transform: scale(1.2);
        }

        .branch-btn:active {
            transform: scale(0.95);
            transition: transform 0.1s;
        }

        /* Branch-specific hover colors */
        .branch-btn.physics:hover {
            background: rgba(255, 107, 107, 0.2);
            border-color: rgba(255, 107, 107, 0.5);
            box-shadow: 0 12px 30px rgba(255, 107, 107, 0.3);
        }

        .branch-btn.chemistry:hover {
            background: rgba(78, 205, 196, 0.2);
            border-color: rgba(78, 205, 196, 0.5);
            box-shadow: 0 12px 30px rgba(78, 205, 196, 0.3);
        }

        .branch-btn.biology:hover {
            background: rgba(69, 183, 170, 0.2);
            border-color: rgba(69, 183, 170, 0.5);
            box-shadow: 0 12px 30px rgba(69, 183, 170, 0.3);
        }

        .branch-btn.history:hover {
            background: rgba(255, 160, 122, 0.2);
            border-color: rgba(255, 160, 122, 0.5);
            box-shadow: 0 12px 30px rgba(255, 160, 122, 0.3);
        }

        .branch-btn.geography:hover {
            background: rgba(135, 206, 235, 0.2);
            border-color: rgba(135, 206, 235, 0.5);
            box-shadow: 0 12px 30px rgba(135, 206, 235, 0.3);
        }

        .branch-btn.political:hover {
            background: rgba(221, 160, 221, 0.2);
            border-color: rgba(221, 160, 221, 0.5);
            box-shadow: 0 12px 30px rgba(221, 160, 221, 0.3);
        }

        /* Arrow indicator on hover */
        .branch-btn::after {
            content: '→';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%) translateX(20px);
            opacity: 0;
            transition: all 0.3s;
            font-size: 18px;
            color: white;
        }

        .branch-btn:hover::after {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            .subjects-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            
            .page-header h1 {
                font-size: 36px;
            }
            
            .branches-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }
            
            .branch-btn {
                padding: 14px 10px;
                font-size: 13px;
            }
            
            .branch-btn i {
                font-size: 24px;
            }
        }

        @media (max-width: 500px) {
            .main-container {
                padding: 20px 12px 40px;
            }
            
            .subject-card {
                padding: 28px 18px;
            }
            
            .subject-header {
                gap: 12px;
            }
            
            .subject-icon {
                width: 60px;
                height: 60px;
                font-size: 28px;
                border-radius: 16px;
            }
            
            .subject-title {
                font-size: 24px;
            }
            
            .branches-grid {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            
            .branch-btn {
                flex-direction: row;
                justify-content: center;
                padding: 14px;
                font-size: 14px;
            }
            
            .branch-btn i {
                font-size: 20px;
            }
            
            .page-header h1 {
                font-size: 28px;
            }
            
            .class-badge {
                font-size: 12px;
                padding: 6px 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Navigation Bar -->
        <div class="nav-bar">
            <button class="back-btn" onclick="goBack()" title="Back to Home">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="breadcrumb">
                <span>Home</span>
                <i class="fas fa-chevron-right" style="font-size: 12px;"></i>
                <span class="current">Class 8</span>
            </div>
            <div class="class-badge">
                <i class="fas fa-graduation-cap"></i> Class VIII
            </div>
        </div>

        <!-- Page Header -->
        <div class="page-header">
            <h1>Class 8 Subjects</h1>
            <p class="subtitle">✦ Choose Your Learning Path ✦</p>
        </div>

        <!-- Subject Cards -->
        <div class="subjects-grid">
            <!-- Science Card -->
            <div class="subject-card science">
                <div class="subject-header">
                    <div class="subject-icon">
                        <i class="fas fa-flask"></i>
                    </div>
                    <div class="subject-title">Science</div>
                </div>
                <div class="branches-grid">
                    <button class="branch-btn physics" onclick="navigateTo('physics')">
                        <i class="fas fa-bolt" style="color: #FF6B6B;"></i>
                        Physics
                    </button>
                    <button class="branch-btn chemistry" onclick="navigateTo('chemistry')">
                        <i class="fas fa-vial" style="color: #4ECDC4;"></i>
                        Chemistry
                    </button>
                    <button class="branch-btn biology" onclick="navigateTo('biology')">
                        <i class="fas fa-dna" style="color: #45B7AA;"></i>
                        Biology
                    </button>
                </div>
            </div>

            <!-- Social Science Card -->
            <div class="subject-card social">
                <div class="subject-header">
                    <div class="subject-icon">
                        <i class="fas fa-globe-americas"></i>
                    </div>
                    <div class="subject-title">Social Science</div>
                </div>
                <div class="branches-grid">
                    <button class="branch-btn history" onclick="navigateTo('history')">
                        <i class="fas fa-landmark" style="color: #FFA07A;"></i>
                        History
                    </button>
                    <button class="branch-btn geography" onclick="navigateTo('geography')">
                        <i class="fas fa-mountain" style="color: #87CEEB;"></i>
                        Geography
                    </button>
                    <button class="branch-btn political" onclick="navigateTo('political')">
                        <i class="fas fa-balance-scale" style="color: #DDA0DD;"></i>
                        Pol. Science
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Navigate to branch page
        function navigateTo(branch) {
            // Add click animation
            document.body.style.transition = 'opacity 0.4s, transform 0.4s';
            document.body.style.opacity = '0';
            document.body.style.transform = 'scale(0.97)';
            
            setTimeout(() => {
                // Map branch names to their respective HTML files
                const pages = {
                    'physics': '8_physics.html',
                    'chemistry': '8_chemistry.html',
                    'biology': '8_biology.html',
                    'history': '8_history.html',
                    'geography': '8_geography.html',
                    'political': '8_political.html'
                };
                
                window.location.href = pages[branch];
            }, 400);
        }

        // Go back to home page
        function goBack() {
            document.body.style.transition = 'opacity 0.4s, transform 0.4s';
            document.body.style.opacity = '0';
            document.body.style.transform = 'scale(0.97)';
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 400);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Number keys for quick navigation
            if (e.key === '1') navigateTo('physics');
            if (e.key === '2') navigateTo('chemistry');
            if (e.key === '3') navigateTo('biology');
            if (e.key === '4') navigateTo('history');
            if (e.key === '5') navigateTo('geography');
            if (e.key === '6') navigateTo('political');
        });
        
        // Add entrance animation
        window.addEventListener('load', () => {
            const buttons = document.querySelectorAll('.branch-btn');
            buttons.forEach((btn, index) => {
                btn.style.opacity = '0';
                btn.style.animation = `fadeInUp 0.5s ease-out ${0.5 + index * 0.1}s forwards`;
            });
        });
    </script>
</body>
</html>
