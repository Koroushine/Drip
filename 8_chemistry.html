<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drip - Class 8 Chemistry Topics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #6C5CE7;
            --chemistry-color: #4ECDC4;
            --chemistry-light: #7EDDD6;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            --radius: 20px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #0d1a2d 30%, #0a1a1a 60%, #150a20 100%);
            min-height: 100vh;
            color: white;
            position: relative;
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(78, 205, 196, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(78, 205, 196, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 25s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(78, 205, 196, 0.25), transparent 70%);
            top: -150px;
            right: -150px;
            animation: orbFloat 12s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(126, 221, 214, 0.2), transparent 70%);
            bottom: -100px;
            left: -100px;
            animation: orbFloat 12s ease-in-out infinite reverse;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, -50px) scale(1.2); }
        }

        .main-container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            padding: 30px 24px 50px;
            max-width: 1500px;
            margin: 0 auto;
        }

        /* Navigation Bar */
        .nav-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-btn {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn:hover {
            background: rgba(78, 205, 196, 0.3);
            transform: translateX(-4px);
            box-shadow: 0 8px 24px rgba(78, 205, 196, 0.3);
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.7);
        }

        .breadcrumb span {
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: color 0.3s;
        }

        .breadcrumb span:hover {
            color: white;
        }

        .breadcrumb .current {
            color: #4ECDC4;
            font-weight: 600;
        }

        .class-badge {
            background: linear-gradient(135deg, #4ECDC4, #7EDDD6);
            padding: 8px 20px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 14px;
            margin-left: auto;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.4);
        }

        /* Header */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-header h1 {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #7EDDD6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .page-header .subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 3px;
        }

        /* Search and Sort Bar */
        .controls-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .search-wrapper {
            flex: 1;
            min-width: 280px;
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 18px;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            border-radius: 16px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1.5px solid var(--glass-border);
            color: white;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .search-input:focus {
            border-color: rgba(78, 205, 196, 0.6);
            box-shadow: 0 8px 30px rgba(78, 205, 196, 0.2);
            background: rgba(255, 255, 255, 0.12);
        }

        .sort-btn {
            padding: 16px 24px;
            border-radius: 16px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1.5px solid var(--glass-border);
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            white-space: nowrap;
        }

        .sort-btn:hover {
            background: rgba(78, 205, 196, 0.2);
            border-color: rgba(78, 205, 196, 0.5);
            box-shadow: 0 8px 24px rgba(78, 205, 196, 0.2);
        }

        .sort-btn.active {
            background: rgba(78, 205, 196, 0.3);
            border-color: rgba(78, 205, 196, 0.7);
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }

        .stat-card {
            padding: 14px 22px;
            border-radius: 14px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .stat-card i {
            color: #4ECDC4;
            font-size: 18px;
        }

        .stat-card .count {
            font-weight: 700;
            color: #7EDDD6;
            font-size: 18px;
        }

        /* Topic Cards */
        .topics-container {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .chapter-section {
            animation: fadeInUp 0.6s ease-out both;
        }

        .chapter-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
            padding: 16px 24px;
            border-radius: 18px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.3s;
        }

        .chapter-header:hover {
            background: rgba(78, 205, 196, 0.15);
            border-color: rgba(78, 205, 196, 0.4);
        }

        .chapter-icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: linear-gradient(135deg, #4ECDC4, #7EDDD6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
        }

        .chapter-info {
            flex: 1;
        }

        .chapter-name {
            font-size: 20px;
            font-weight: 700;
            color: white;
        }

        .chapter-count {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }

        .chapter-toggle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            transition: transform 0.3s;
        }

        .chapter-section.collapsed .chapter-toggle {
            transform: rotate(-90deg);
        }

        .chapter-section.collapsed .topics-grid {
            display: none;
        }

        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 16px;
            padding: 0 8px;
        }

        .topic-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 24px;
            transition: all 0.3s;
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .topic-card:hover {
            background: rgba(78, 205, 196, 0.12);
            border-color: rgba(78, 205, 196, 0.4);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(78, 205, 196, 0.15);
        }

        .topic-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #4ECDC4, #7EDDD6);
            border-radius: 4px 0 0 4px;
        }

        .topic-name {
            font-size: 17px;
            font-weight: 700;
            color: #7EDDD6;
            margin-bottom: 12px;
            letter-spacing: 0.3px;
        }

        .topic-definition {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.7;
            margin-bottom: 14px;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            border-left: 3px solid #4ECDC4;
        }

        .topic-example {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.65);
            line-height: 1.6;
            padding: 10px 14px;
            background: rgba(78, 205, 196, 0.08);
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .topic-example strong {
            color: #4ECDC4;
        }

        .topic-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .topic-tag {
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 11px;
            background: rgba(78, 205, 196, 0.2);
            color: #7EDDD6;
            font-weight: 600;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            display: none;
        }

        .no-results i {
            font-size: 48px;
            margin-bottom: 16px;
            color: rgba(78, 205, 196, 0.4);
        }

        .no-results h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        @media (max-width: 768px) {
            .topics-grid {
                grid-template-columns: 1fr;
            }
            
            .page-header h1 {
                font-size: 32px;
            }
            
            .controls-bar {
                flex-direction: column;
            }
            
            .search-wrapper {
                min-width: 100%;
            }
        }

        @media (max-width: 500px) {
            .main-container {
                padding: 16px 10px 40px;
            }
            
            .topic-card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="main-container">
        <!-- Navigation Bar -->
        <div class="nav-bar">
            <button class="back-btn" onclick="goBack()" title="Back to Subjects">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="breadcrumb">
                <span onclick="goHome()">Home</span>
                <i class="fas fa-chevron-right" style="font-size: 12px;"></i>
                <span onclick="goBack()">Class 8</span>
                <i class="fas fa-chevron-right" style="font-size: 12px;"></i>
                <span class="current">Chemistry</span>
            </div>
            <div class="class-badge">
                <i class="fas fa-vial"></i> Chemistry Topics
            </div>
        </div>

        <!-- Page Header -->
        <div class="page-header">
            <h1>🧪 Class 8 Chemistry Topics</h1>
            <p class="subtitle">✦ 300+ Topics with Definitions & Examples ✦</p>
        </div>

        <!-- Search and Sort Controls -->
        <div class="controls-bar">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="Search topics, definitions, or examples... (e.g., metal, combustion, polymer)" oninput="filterTopics()">
            </div>
            <button class="sort-btn" id="sortBtn" onclick="toggleSort()">
                <i class="fas fa-sort-alpha-down"></i>
                <span id="sortLabel">Sort: By Chapter</span>
            </button>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-card">
                <i class="fas fa-bookmark"></i>
                <span>Total Topics:</span>
                <span class="count" id="totalCount">318</span>
            </div>
            <div class="stat-card">
                <i class="fas fa-folder"></i>
                <span>Chapters:</span>
                <span class="count">10</span>
            </div>
            <div class="stat-card">
                <i class="fas fa-eye"></i>
                <span>Showing:</span>
                <span class="count" id="visibleCount">318</span>
            </div>
        </div>

        <!-- Topics Container -->
        <div class="topics-container" id="topicsContainer"></div>

        <!-- No Results -->
        <div class="no-results" id="noResults">
            <i class="fas fa-search"></i>
            <h3>No topics found</h3>
            <p>Try a different search term</p>
        </div>
    </div>

    <script>
        const topicsData = [
            {
                chapter: "Metals and Non-metals - Physical Properties",
                icon: "fa-cube",
                topics: [
                    { name: "Malleability", definition: "Malleability is the property of metals by which they can be beaten into thin sheets without breaking.", example: "<strong>Example:</strong> Gold is the most malleable metal - 1 gram can be beaten into a sheet of 1 square meter. Aluminum foil used in kitchens demonstrates malleability.", tags: ["malleable", "sheets", "beating", "metals"] },
                    { name: "Ductility", definition: "Ductility is the property of metals that allows them to be drawn into thin wires.", example: "<strong>Example:</strong> Copper is highly ductile and is used to make electrical wires. Gold can be drawn into wires thinner than human hair.", tags: ["ductile", "wires", "drawing", "metals"] },
                    { name: "Lustre", definition: "Lustre is the shiny appearance of a material's surface when light reflects off it. Metals have metallic lustre.", example: "<strong>Example:</strong> Freshly cut iron shows silvery-white lustre. Gold and silver jewelry retain their lustre for years. Non-metals like sulfur lack lustre.", tags: ["shiny", "lustre", "reflection", "appearance"] },
                    { name: "Hardness", definition: "Hardness is the resistance of a material to being scratched or dented. Most metals are hard, but some are soft.", example: "<strong>Example:</strong> Iron and steel are very hard metals used in construction. Sodium and potassium are soft metals that can be cut with a knife.", tags: ["hard", "scratch", "resistance", "metals"] },
                    { name: "Conductivity (Thermal)", definition: "Thermal conductivity is the ability of a material to conduct heat. Metals are good thermal conductors.", example: "<strong>Example:</strong> Copper-bottomed utensils conduct heat quickly for cooking. Silver has the highest thermal conductivity among metals.", tags: ["heat", "conduction", "thermal", "metals"] },
                    { name: "Conductivity (Electrical)", definition: "Electrical conductivity is the ability of a material to allow electric current to flow through it.", example: "<strong>Example:</strong> Copper and aluminum wires are used for electrical transmission. Silver is the best electrical conductor but is expensive.", tags: ["electricity", "conduction", "wires", "current"] },
                    { name: "Sonority", definition: "Sonority is the property of metals to produce a ringing sound when struck.", example: "<strong>Example:</strong> School bells are made of metals because of their sonorous nature. Tuning forks are made of steel for clear ringing sounds.", tags: ["sound", "ringing", "bell", "sonorous"] },
                    { name: "Density", definition: "Density is mass per unit volume. Metals generally have high density compared to non-metals.", example: "<strong>Example:</strong> Iron has density 7.8 g/cm³ (sinks in water). Lithium has density 0.53 g/cm³ (floats on water - lightest metal).", tags: ["density", "mass", "volume", "heavy"] },
                    { name: "Melting Point", definition: "Melting point is the temperature at which a solid changes to liquid. Metals generally have high melting points.", example: "<strong>Example:</strong> Tungsten melts at 3422°C (highest among metals, used in bulbs). Gallium melts at 29.8°C (melts in your hand).", tags: ["melting", "temperature", "solid", "liquid"] },
                    { name: "Brittleness", definition: "Brittleness is the property of a material to break or shatter when hammered. Non-metals are generally brittle.", example: "<strong>Example:</strong> Sulfur and phosphorus crumble when struck with a hammer. Glass and ceramics are brittle materials.", tags: ["brittle", "break", "shatter", "non-metals"] },
                    { name: "Tensile Strength", definition: "Tensile strength is the maximum stress a material can withstand while being stretched before breaking.", example: "<strong>Example:</strong> Steel cables in bridges have high tensile strength. Spider silk has tensile strength comparable to steel.", tags: ["tensile", "strength", "stretch", "cable"] },
                    { name: "Physical State at Room Temperature", definition: "Most metals are solid at room temperature except mercury which is liquid. Non-metals exist as solids, liquids, or gases.", example: "<strong>Example:</strong> Mercury (Hg) is the only liquid metal at room temp. Bromine is the only liquid non-metal. Nitrogen and oxygen are gaseous non-metals.", tags: ["state", "solid", "liquid", "gas", "mercury"] },
                    { name: "Elasticity", definition: "Elasticity is the ability of a material to return to its original shape after being stretched or compressed.", example: "<strong>Example:</strong> Steel springs are highly elastic. Rubber bands show elasticity. Lead shows very low elasticity (plastic deformation).", tags: ["elastic", "spring", "stretch", "shape"] },
                    { name: "Metallic Bonding", definition: "Metallic bonding is the electrostatic attraction between positive metal ions and delocalized electrons in a metal lattice.", example: "<strong>Example:</strong> In copper, positively charged Cu²⁺ ions are surrounded by a sea of delocalized electrons, allowing conductivity.", tags: ["bonding", "electrons", "lattice", "sea"] },
                    { name: "Alloy Formation", definition: "Alloys are homogeneous mixtures of two or more metals, or metals with non-metals, with enhanced properties.", example: "<strong>Example:</strong> Steel (iron + carbon), Brass (copper + zinc), Bronze (copper + tin), Stainless steel (iron + chromium + nickel).", tags: ["alloy", "mixture", "steel", "brass", "bronze"] },
                    { name: "Corrosion Resistance", definition: "Corrosion resistance is the ability of a material to resist deterioration due to reaction with the environment.", example: "<strong>Example:</strong> Gold and platinum do not corrode. Stainless steel resists rusting due to chromium oxide layer.", tags: ["corrosion", "resistance", "rust", "protective"] },
                    { name: "Reactivity Series (Metals)", definition: "The reactivity series arranges metals in order of decreasing reactivity based on their reactions with water, acids, and oxygen.", example: "<strong>Example:</strong> K > Na > Ca > Mg > Al > Zn > Fe > Pb > Cu > Ag > Au (Potassium most reactive, Gold least reactive).", tags: ["reactivity", "series", "order", "reactions"] },
                    { name: "Amphoteric Metals", definition: "Amphoteric metals react with both acids and bases to produce salt and hydrogen gas.", example: "<strong>Example:</strong> Aluminum and zinc are amphoteric. Al + HCl → AlCl₃ + H₂ and Al + NaOH → NaAlO₂ + H₂.", tags: ["amphoteric", "acid", "base", "aluminum", "zinc"] },
                    { name: "Passivation", definition: "Passivation is the formation of a thin protective oxide layer on metal surfaces that prevents further reaction.", example: "<strong>Example:</strong> Aluminum forms Al₂O₃ layer preventing further oxidation. Stainless steel's chromium oxide layer provides corrosion resistance.", tags: ["passivation", "oxide", "layer", "protective"] },
                    { name: "Galvanization", definition: "Galvanization is the process of coating iron or steel with zinc to prevent rusting.", example: "<strong>Example:</strong> Galvanized iron sheets used for roofing. Water pipes are galvanized to prevent corrosion. Zinc acts as sacrificial metal.", tags: ["galvanize", "zinc", "coating", "rust", "sacrificial"] },
                    { name: "Anodizing", definition: "Anodizing is an electrochemical process that thickens the natural oxide layer on aluminum for better corrosion resistance.", example: "<strong>Example:</strong> Anodized aluminum used in smartphone bodies, window frames, and cookware. Can be dyed for decorative finishes.", tags: ["anodize", "aluminum", "oxide", "electrochemical"] },
                    { name: "Metal Fatigue", definition: "Metal fatigue is the weakening of metal due to repeated cyclic loading and unloading, leading to crack formation.", example: "<strong>Example:</strong> Aircraft components undergo regular inspection for metal fatigue. Repeated bending of a paperclip until it breaks demonstrates fatigue.", tags: ["fatigue", "cyclic", "crack", "failure"] },
                    { name: "Work Hardening", definition: "Work hardening (strain hardening) is the strengthening of metal by plastic deformation through hammering or bending.", example: "<strong>Example:</strong> Copper wire becomes stiffer when repeatedly bent. Blacksmiths hammer hot iron to increase its strength.", tags: ["hardening", "work", "deformation", "strengthen"] },
                    { name: "Annealing", definition: "Annealing is heating metal to a specific temperature and slowly cooling it to reduce hardness and increase ductility.", example: "<strong>Example:</strong> Annealed copper wire is soft and flexible for electrical use. Glass is annealed to relieve internal stresses.", tags: ["anneal", "heat", "cool", "soften"] },
                    { name: "Quenching", definition: "Quenching is rapid cooling of hot metal by immersing in water or oil to increase hardness.", example: "<strong>Example:</strong> Sword makers quench hot steel in oil. Quenched steel becomes very hard but can be brittle.", tags: ["quench", "rapid", "cool", "harden"] },
                    { name: "Tempering", definition: "Tempering is reheating quenched metal to a moderate temperature to reduce brittleness while maintaining hardness.", example: "<strong>Example:</strong> Chisels and hammers are tempered after quenching. Tempered glass breaks into small granules instead of sharp shards.", tags: ["temper", "reheat", "toughness", "brittle"] },
                    { name: "Superconductivity", definition: "Superconductivity is the complete loss of electrical resistance in certain materials at very low temperatures.", example: "<strong>Example:</strong> Mercury becomes superconducting below 4.2K. Niobium-titanium alloys used in MRI machines are superconductors.", tags: ["superconductor", "resistance", "low temperature", "MRI"] },
                    { name: "Thermoelectric Effect", definition: "The thermoelectric effect is the direct conversion of temperature differences to electric voltage in metals/semiconductors.", example: "<strong>Example:</strong> Thermocouples use two different metals joined together to measure temperature based on voltage generated.", tags: ["thermoelectric", "temperature", "voltage", "thermocouple"] },
                    { name: "Piezoelectric Effect", definition: "Piezoelectric effect is the ability of certain materials to generate electric charge in response to mechanical stress.", example: "<strong>Example:</strong> Quartz crystals in watches generate pulses. Piezoelectric sensors in car airbags detect collision impact.", tags: ["piezoelectric", "pressure", "charge", "quartz"] },
                    { name: "Shape Memory Alloys", definition: "Shape memory alloys can return to their original shape after deformation when heated above a transition temperature.", example: "<strong>Example:</strong> Nitinol (Nickel-Titanium) used in orthodontic wires and eyeglass frames. Stents in blood vessels use shape memory effect.", tags: ["shape memory", "nitinol", "deformation", "heat"] }
                ]
            },
            {
                chapter: "Uses of Metals and Non-metals",
                icon: "fa-industry",
                topics: [
                    { name: "Iron and Steel in Construction", definition: "Iron and its alloy steel are primary materials for building structures due to high strength and durability.", example: "<strong>Example:</strong> Reinforced concrete uses steel bars (rebar). The Eiffel Tower is made of wrought iron. Skyscrapers have steel frameworks.", tags: ["iron", "steel", "construction", "building"] },
                    { name: "Copper in Electrical Wiring", definition: "Copper is the most commonly used metal for electrical wires due to its excellent conductivity and ductility.", example: "<strong>Example:</strong> Household electrical wiring uses copper. Power transmission lines use copper or aluminum. Printed circuit boards have copper traces.", tags: ["copper", "wiring", "electrical", "conductivity"] },
                    { name: "Aluminum in Aerospace", definition: "Aluminum's light weight and strength make it ideal for aircraft bodies and aerospace applications.", example: "<strong>Example:</strong> Boeing 747 uses about 66% aluminum by weight. Satellite frames use aluminum alloys. Drink cans are made of aluminum.", tags: ["aluminum", "aerospace", "lightweight", "aircraft"] },
                    { name: "Gold in Electronics", definition: "Gold's excellent conductivity and corrosion resistance make it valuable for high-reliability electronic contacts.", example: "<strong>Example:</strong> Gold-plated connectors in smartphones. Computer processor pins are gold-plated. Space satellite components use gold.", tags: ["gold", "electronics", "connectors", "corrosion resistant"] },
                    { name: "Silver in Mirrors", definition: "Silver's high reflectivity makes it ideal for mirrors. A thin silver layer is deposited on glass.", example: "<strong>Example:</strong> Bathroom mirrors use silver backing. Telescope mirrors often use silver coating. Solar reflectors use silver for maximum reflection.", tags: ["silver", "mirror", "reflect", "coating"] },
                    { name: "Zinc in Galvanization", definition: "Zinc coating protects iron from rusting by acting as a sacrificial anode (galvanization process).", example: "<strong>Example:</strong> Galvanized iron sheets for roofing. Highway guardrails are galvanized. Buckets and water tanks are galvanized.", tags: ["zinc", "galvanize", "protect", "sacrificial"] },
                    { name: "Lead in Batteries", definition: "Lead is used in lead-acid batteries due to its electrochemical properties and low cost.", example: "<strong>Example:</strong> Car batteries are lead-acid type. UPS backup systems use lead-acid batteries. Lead shielding blocks X-rays in medical rooms.", tags: ["lead", "battery", "acid", "car"] },
                    { name: "Mercury in Thermometers", definition: "Mercury's uniform expansion with temperature makes it suitable for thermometers (though being phased out).", example: "<strong>Example:</strong> Clinical thermometers traditionally used mercury. Barometers measure atmospheric pressure using mercury column.", tags: ["mercury", "thermometer", "expansion", "liquid metal"] },
                    { name: "Titanium in Implants", definition: "Titanium's biocompatibility and strength make it ideal for medical implants and prosthetics.", example: "<strong>Example:</strong> Hip replacement joints use titanium. Dental implants are made of titanium. Aircraft engine parts use titanium alloys.", tags: ["titanium", "implant", "medical", "biocompatible"] },
                    { name: "Platinum in Catalytic Converters", definition: "Platinum acts as a catalyst in vehicle exhaust systems to convert harmful gases into less toxic emissions.", example: "<strong>Example:</strong> Car catalytic converters contain platinum. Chemical industry uses platinum as catalyst. Jewelry uses platinum for its lustre.", tags: ["platinum", "catalyst", "converter", "exhaust"] },
                    { name: "Sulfur in Vulcanization", definition: "Sulfur is used to vulcanize rubber, cross-linking polymer chains to improve elasticity and strength.", example: "<strong>Example:</strong> Car tires are vulcanized with sulfur. Rubber bands and shoe soles use vulcanized rubber.", tags: ["sulfur", "vulcanize", "rubber", "cross-link"] },
                    { name: "Nitrogen in Food Packaging", definition: "Nitrogen gas creates an inert atmosphere in food packages to prevent oxidation and spoilage.", example: "<strong>Example:</strong> Potato chip bags are filled with nitrogen. Coffee packaging uses nitrogen flushing. Electronic components stored under nitrogen.", tags: ["nitrogen", "packaging", "inert", "preserve"] },
                    { name: "Chlorine in Water Purification", definition: "Chlorine kills bacteria and pathogens in drinking water and swimming pools through disinfection.", example: "<strong>Example:</strong> Municipal water treatment uses chlorine. Swimming pool maintenance uses chlorine tablets. Bleach contains chlorine compounds.", tags: ["chlorine", "water", "purify", "disinfect"] },
                    { name: "Phosphorus in Fertilizers", definition: "Phosphorus is an essential nutrient for plant growth and a key component of NPK fertilizers.", example: "<strong>Example:</strong> Superphosphate fertilizer contains phosphorus. DNA and ATP in living cells contain phosphorus. Match heads use phosphorus compounds.", tags: ["phosphorus", "fertilizer", "plant", "nutrient"] },
                    { name: "Carbon in Steel Making", definition: "Carbon is added to iron to make steel, significantly increasing hardness and strength.", example: "<strong>Example:</strong> Mild steel has 0.05-0.25% carbon. High-carbon steel (0.6-1.0% C) used for cutting tools. Cast iron has 2-4% carbon.", tags: ["carbon", "steel", "iron", "alloy"] },
                    { name: "Silicon in Electronics", definition: "Silicon is the primary semiconductor material used in computer chips and electronic devices.", example: "<strong>Example:</strong> Microprocessors are made on silicon wafers. Solar cells use silicon to convert light to electricity. Glass contains silicon dioxide.", tags: ["silicon", "semiconductor", "chip", "computer"] },
                    { name: "Iodine in Salt", definition: "Iodine is added to table salt to prevent iodine deficiency disorders like goiter.", example: "<strong>Example:</strong> Iodized salt is commonly available. Thyroid gland needs iodine to produce hormones. Seaweed is rich in natural iodine.", tags: ["iodine", "salt", "thyroid", "health"] },
                    { name: "Tungsten in Light Bulbs", definition: "Tungsten's extremely high melting point (3422°C) makes it ideal for incandescent light bulb filaments.", example: "<strong>Example:</strong> Traditional light bulb filaments are tungsten. TIG welding electrodes use tungsten. Armor-piercing ammunition uses tungsten.", tags: ["tungsten", "bulb", "filament", "high melting"] },
                    { name: "Chromium in Stainless Steel", definition: "Chromium forms a passive oxide layer on steel, making it 'stainless' and corrosion-resistant.", example: "<strong>Example:</strong> Kitchen sinks are stainless steel (18% Cr, 8% Ni). Surgical instruments use stainless steel. Car exhausts use stainless steel.", tags: ["chromium", "stainless", "steel", "oxide layer"] },
                    { name: "Nickel in Coins", definition: "Nickel is used in coinage alloys for its hardness, corrosion resistance, and silvery appearance.", example: "<strong>Example:</strong> Indian coins use nickel-brass alloy. Canadian nickels were pure nickel. Rechargeable NiMH batteries use nickel.", tags: ["nickel", "coin", "alloy", "battery"] },
                    { name: "Magnesium in Flares", definition: "Magnesium burns with a brilliant white light, making it useful for flares, fireworks, and flash photography.", example: "<strong>Example:</strong> Emergency flares use magnesium. Fireworks contain magnesium for white sparks. Old camera flash bulbs used magnesium wire.", tags: ["magnesium", "flare", "firework", "bright"] },
                    { name: "Oxygen in Respiration", definition: "Oxygen is essential for cellular respiration in living organisms, releasing energy from food.", example: "<strong>Example:</strong> Humans breathe oxygen. Hospitals provide oxygen therapy. Oxy-acetylene welding uses pure oxygen.", tags: ["oxygen", "respiration", "breathing", "energy"] },
                    { name: "Hydrogen as Fuel", definition: "Hydrogen is a clean-burning fuel producing only water vapor. Used in fuel cells and rocket propulsion.", example: "<strong>Example:</strong> Hydrogen fuel cell vehicles emit only water. Rockets use liquid hydrogen as fuel. Weather balloons are filled with hydrogen.", tags: ["hydrogen", "fuel", "clean", "rocket"] },
                    { name: "Graphite as Lubricant", definition: "Graphite's layered structure allows sheets to slide over each other, making it an excellent dry lubricant.", example: "<strong>Example:</strong> Pencil 'lead' is graphite. Graphite powder lubricates locks. Electric motor brushes are made of graphite.", tags: ["graphite", "lubricant", "layered", "pencil"] },
                    { name: "Diamond in Cutting Tools", definition: "Diamond is the hardest natural material, used for cutting, grinding, and drilling other hard materials.", example: "<strong>Example:</strong> Diamond-tipped saw blades cut concrete. Industrial diamonds are used in drill bits. Diamond paste polishes gemstones.", tags: ["diamond", "cutting", "hard", "drill"] }
                ]
            },
            {
                chapter: "Chemical Reactions of Metals",
                icon: "fa-flask",
                topics: [
                    { name: "Metal + Oxygen Reaction", definition: "Metals react with oxygen to form metal oxides, which are generally basic in nature.", example: "<strong>Example:</strong> 2Mg + O₂ → 2MgO (magnesium burns with brilliant white flame). 4Fe + 3O₂ → 2Fe₂O₃ (iron rusts).", tags: ["oxygen", "oxide", "basic", "burning"] },
                    { name: "Metal + Water Reaction", definition: "Reactive metals react with water to form metal hydroxides and hydrogen gas.", example: "<strong>Example:</strong> 2Na + 2H₂O → 2NaOH + H₂ (sodium reacts vigorously). Ca + 2H₂O → Ca(OH)₂ + H₂ (calcium sinks and bubbles).", tags: ["water", "hydroxide", "hydrogen", "reactive"] },
                    { name: "Metal + Acid Reaction", definition: "Metals react with dilute acids to form salt and hydrogen gas. More reactive metals react faster.", example: "<strong>Example:</strong> Zn + H₂SO₄ → ZnSO₄ + H₂ (zinc dissolves with bubbles). Mg + 2HCl → MgCl₂ + H₂ (magnesium ribbon reacts vigorously).", tags: ["acid", "salt", "hydrogen", "bubbles"] },
                    { name: "Metal + Steam Reaction", definition: "Less reactive metals that don't react with cold water can react with steam to form oxides and hydrogen.", example: "<strong>Example:</strong> 3Fe + 4H₂O(steam) → Fe₃O₄ + 4H₂. Aluminum reacts with steam: 2Al + 3H₂O → Al₂O₃ + 3H₂.", tags: ["steam", "oxide", "hydrogen", "less reactive"] },
                    { name: "Displacement Reaction", definition: "A more reactive metal displaces a less reactive metal from its salt solution.", example: "<strong>Example:</strong> Fe + CuSO₄ → FeSO₄ + Cu (blue copper sulfate turns green as iron displaces copper).", tags: ["displacement", "salt solution", "reactivity", "copper"] },
                    { name: "Rusting of Iron", definition: "Rusting is the slow oxidation of iron in the presence of moisture and oxygen to form hydrated iron oxide.", example: "<strong>Example:</strong> 4Fe + 3O₂ + 2xH₂O → 2Fe₂O₃·xH₂O. Rust is reddish-brown, flaky, and porous, exposing more iron to corrosion.", tags: ["rust", "iron", "oxidation", "moisture"] },
                    { name: "Prevention of Rusting", definition: "Rusting can be prevented by applying protective coatings like paint, oil, or zinc (galvanization).", example: "<strong>Example:</strong> Painting iron gates and bridges. Oiling tools and machinery. Chrome plating on car bumpers.", tags: ["prevent", "rust", "coating", "galvanize"] },
                    { name: "Sacrificial Protection", definition: "A more reactive metal (like zinc or magnesium) is attached to iron to corrode instead of the iron.", example: "<strong>Example:</strong> Zinc blocks bolted to ship hulls protect steel from seawater corrosion. Underground pipelines use magnesium anodes.", tags: ["sacrificial", "zinc", "magnesium", "protect"] },
                    { name: "Metal + Base Reaction", definition: "Some amphoteric metals like aluminum and zinc react with strong bases to form salt and hydrogen.", example: "<strong>Example:</strong> 2Al + 2NaOH + 2H₂O → 2NaAlO₂ + 3H₂. Zinc reacts with KOH: Zn + 2KOH → K₂ZnO₂ + H₂.", tags: ["base", "amphoteric", "aluminum", "zinc"] },
                    { name: "Thermite Reaction", definition: "Thermite reaction is a highly exothermic reaction between aluminum powder and iron oxide, producing molten iron.", example: "<strong>Example:</strong> Fe₂O₃ + 2Al → 2Fe + Al₂O₃ (temperature reaches ~2500°C). Used in railway welding and demolition.", tags: ["thermite", "aluminum", "iron oxide", "exothermic"] },
                    { name: "Combination Reaction", definition: "Two or more substances combine to form a single product. Metal + oxygen is a combination reaction.", example: "<strong>Example:</strong> 2Mg + O₂ → 2MgO. C + O₂ → CO₂. These are also exothermic reactions releasing heat and light.", tags: ["combination", "synthesis", "product", "exothermic"] },
                    { name: "Decomposition Reaction", definition: "A single compound breaks down into two or more simpler substances when heated.", example: "<strong>Example:</strong> 2HgO → 2Hg + O₂ (mercury oxide decomposes on heating). CaCO₃ → CaO + CO₂ (limestone decomposes).", tags: ["decomposition", "breakdown", "heat", "simpler"] },
                    { name: "Redox Reaction", definition: "Redox (reduction-oxidation) reactions involve simultaneous loss and gain of electrons between reactants.", example: "<strong>Example:</strong> In rusting: Fe → Fe³⁺ + 3e⁻ (oxidation), O₂ + 4e⁻ → 2O²⁻ (reduction). Both happen simultaneously.", tags: ["redox", "oxidation", "reduction", "electrons"] },
                    { name: "Oxidation", definition: "Oxidation is the loss of electrons by an atom or ion, or the gain of oxygen/hydrogen loss.", example: "<strong>Example:</strong> Fe → Fe²⁺ + 2e⁻ (iron oxidizes). 2Cu + O₂ → 2CuO (copper oxidizes). Burning is rapid oxidation.", tags: ["oxidation", "lose electrons", "oxygen gain", "rust"] },
                    { name: "Reduction", definition: "Reduction is the gain of electrons by an atom or ion, or the loss of oxygen/hydrogen gain.", example: "<strong>Example:</strong> CuO + H₂ → Cu + H₂O (copper oxide reduced to copper). Fe₂O₃ + 3CO → 2Fe + 3CO₂ (iron ore reduced in blast furnace).", tags: ["reduction", "gain electrons", "oxygen loss", "smelting"] },
                    { name: "Exothermic Reaction", definition: "An exothermic reaction releases energy in the form of heat or light to the surroundings.", example: "<strong>Example:</strong> All combustion reactions are exothermic. NaOH dissolving in water releases heat. Respiration is exothermic.", tags: ["exothermic", "release", "heat", "light"] },
                    { name: "Endothermic Reaction", definition: "An endothermic reaction absorbs energy from the surroundings, causing cooling effect.", example: "<strong>Example:</strong> Photosynthesis absorbs sunlight energy. Melting ice cubes absorbs heat. Ba(OH)₂ + NH₄Cl becomes very cold.", tags: ["endothermic", "absorb", "cool", "photosynthesis"] },
                    { name: "Neutralization Reaction", definition: "An acid reacts with a base to form salt and water. This is a type of double displacement reaction.", example: "<strong>Example:</strong> HCl + NaOH → NaCl + H₂O. H₂SO₄ + CuO → CuSO₄ + H₂O. Stomach antacids neutralize excess acid.", tags: ["neutralization", "acid", "base", "salt", "water"] },
                    { name: "Precipitation Reaction", definition: "A precipitation reaction produces an insoluble solid (precipitate) when two solutions are mixed.", example: "<strong>Example:</strong> AgNO₃ + NaCl → AgCl↓ + NaNO₃ (white precipitate). Pb(NO₃)₂ + 2KI → PbI₂↓ + 2KNO₃ (yellow precipitate).", tags: ["precipitation", "insoluble", "solid", "precipitate"] },
                    { name: "Corrosion", definition: "Corrosion is the gradual destruction of metals by chemical or electrochemical reaction with the environment.", example: "<strong>Example:</strong> Tarnishing of silver (Ag₂S black layer). Green patina on copper statues (Cu₂(OH)₂CO₃). Aluminum oxide layer is self-protective.", tags: ["corrosion", "destruction", "environment", "tarnish"] },
                    { name: "Galvanic Corrosion", definition: "Galvanic corrosion occurs when two dissimilar metals are in electrical contact in an electrolyte.", example: "<strong>Example:</strong> Steel screws in aluminum panels corrode faster. Copper pipes connected to iron tanks cause iron to rust faster.", tags: ["galvanic", "dissimilar metals", "electrolyte", "contact"] },
                    { name: "Passive Layer Formation", definition: "Some metals form a thin, dense oxide layer that protects the underlying metal from further reaction.", example: "<strong>Example:</strong> Aluminum's Al₂O₃ layer prevents further oxidation. Stainless steel's Cr₂O₃ layer makes it 'stainless'.", tags: ["passive", "layer", "protective", "oxide"] },
                    { name: "Hydrogen Embrittlement", definition: "Hydrogen atoms can diffuse into metals, making them brittle and prone to cracking under stress.", example: "<strong>Example:</strong> High-strength steel bolts can fail due to hydrogen from corrosion or electroplating. Titanium alloys are susceptible.", tags: ["hydrogen", "embrittlement", "brittle", "crack"] }
                ]
            },
            {
                chapter: "Coal and Petroleum",
                icon: "fa-oil-well",
                topics: [
                    { name: "Fossil Fuels", definition: "Fossil fuels are energy-rich substances formed from the remains of dead plants and animals buried millions of years ago.", example: "<strong>Example:</strong> Coal, petroleum, and natural gas are fossil fuels. They are non-renewable resources formed under heat and pressure.", tags: ["fossil", "fuel", "coal", "petroleum", "gas"] },
                    { name: "Formation of Coal", definition: "Coal formed from plant remains buried in swamps millions of years ago, compressed under layers of soil and rock.", example: "<strong>Example:</strong> Carboniferous forests (300 million years ago) formed coal deposits. Process: Peat → Lignite → Bituminous → Anthracite.", tags: ["coal", "formation", "plants", "carboniferous"] },
                    { name: "Carbonization", definition: "Carbonization is the slow conversion of plant material into carbon-rich coal under high pressure and temperature.", example: "<strong>Example:</strong> Wood buried in absence of oxygen carbonizes over millions of years. Anthracite is 92-98% carbon (highest quality coal).", tags: ["carbonization", "plant", "carbon", "pressure"] },
                    { name: "Peat", definition: "Peat is the earliest stage of coal formation, partially decomposed plant material with high moisture content.", example: "<strong>Example:</strong> Peat bogs in Ireland and Scotland. Peat burns with smoke and low heat. Used as fuel in some regions.", tags: ["peat", "stage", "decomposed", "moisture"] },
                    { name: "Lignite", definition: "Lignite is brown coal with 25-35% carbon content, formed from compressed peat over time.", example: "<strong>Example:</strong> Neyveli in Tamil Nadu has lignite mines. Used in thermal power plants. Contains more moisture and impurities than higher grades.", tags: ["lignite", "brown coal", "low carbon", "power plant"] },
                    { name: "Bituminous Coal", definition: "Bituminous coal contains 45-86% carbon. It's the most common type used for electricity generation.", example: "<strong>Example:</strong> Most Indian coal is bituminous (Jharia, Raniganj). Used in blast furnaces for steel making. Burns with smoky yellow flame.", tags: ["bituminous", "common", "electricity", "steel"] },
                    { name: "Anthracite", definition: "Anthracite is the highest grade of coal with 92-98% carbon, burning with little smoke and high heat.", example: "<strong>Example:</strong> Found in small quantities in Jammu & Kashmir. Preferred for home heating. Hardest and shiniest coal.", tags: ["anthracite", "highest", "carbon", "clean burning"] },
                    { name: "Destructive Distillation of Coal", definition: "Heating coal in absence of air produces coke, coal tar, coal gas, and ammoniacal liquor.", example: "<strong>Example:</strong> Coke used in steel blast furnaces. Coal tar used for making dyes, drugs, and pesticides. Coal gas was used for street lighting.", tags: ["destructive", "distillation", "coke", "coal tar"] },
                    { name: "Coke", definition: "Coke is a porous, black residue from destructive distillation of coal, almost pure carbon.", example: "<strong>Example:</strong> Used as reducing agent in blast furnace: Fe₂O₃ + 3C → 2Fe + 3CO. Coke is used as a smokeless fuel.", tags: ["coke", "porous", "carbon", "blast furnace"] },
                    { name: "Coal Tar", definition: "Coal tar is a thick, black liquid from coal distillation, containing many aromatic compounds.", example: "<strong>Example:</strong> Naphthalene (mothballs), benzene, toluene, phenol, and pitch are derived from coal tar. Used in road surfacing.", tags: ["coal tar", "aromatic", "naphthalene", "pitch"] },
                    { name: "Formation of Petroleum", definition: "Petroleum formed from tiny marine organisms that died and were buried under sedimentary rock layers.", example: "<strong>Example:</strong> Plankton and algae buried under ocean sediments millions of years ago transformed into oil and gas under heat and pressure.", tags: ["petroleum", "formation", "marine", "organisms"] },
                    { name: "Crude Oil", definition: "Crude oil (petroleum) is a complex mixture of hydrocarbons, mainly alkanes, found trapped in porous rocks.", example: "<strong>Example:</strong> Bombay High offshore oil field. Crude oil is dark, viscous, and has a characteristic smell. It cannot be used directly.", tags: ["crude", "oil", "hydrocarbons", "alkanes"] },
                    { name: "Petroleum Refining", definition: "Petroleum refining is the separation of crude oil into useful fractions by fractional distillation.", example: "<strong>Example:</strong> Refinery fractions: LPG (<40°C), Petrol (40-170°C), Kerosene (170-250°C), Diesel (250-350°C), Bitumen (>350°C).", tags: ["refining", "fractional", "distillation", "fractions"] },
                    { name: "Fractional Distillation", definition: "Fractional distillation separates liquid mixtures based on differences in boiling points.", example: "<strong>Example:</strong> In oil refineries, crude oil heated to ~400°C enters fractionating column. Fractions condense at different heights based on boiling points.", tags: ["fractional", "distillation", "boiling point", "column"] },
                    { name: "LPG (Liquefied Petroleum Gas)", definition: "LPG is a mixture of propane and butane, compressed into liquid form for storage and transport.", example: "<strong>Example:</strong> Cooking gas cylinders contain LPG. Ethyl mercaptan is added for odor to detect leaks. Cleaner than coal or wood.", tags: ["LPG", "propane", "butane", "cooking"] },
                    { name: "Petrol (Gasoline)", definition: "Petrol is a volatile liquid fuel used in spark-ignition internal combustion engines (cars, motorcycles).", example: "<strong>Example:</strong> Octane rating measures petrol quality. Higher octane prevents engine knocking. BS-VI norms regulate petrol quality in India.", tags: ["petrol", "gasoline", "car", "engine"] },
                    { name: "Kerosene", definition: "Kerosene is a less volatile fuel used for heating, cooking, and as aviation turbine fuel.", example: "<strong>Example:</strong> Jet aircraft use kerosene-based ATF (Aviation Turbine Fuel). Kerosene stoves used where LPG unavailable. Also used as solvent.", tags: ["kerosene", "jet fuel", "ATF", "stove"] },
                    { name: "Diesel", definition: "Diesel is a heavier fuel used in compression-ignition engines like trucks, buses, and generators.", example: "<strong>Example:</strong> Diesel engines have higher efficiency than petrol engines. Cetane number measures diesel quality. Used in railways and agriculture.", tags: ["diesel", "truck", "engine", "heavy"] },
                    { name: "Lubricating Oil", definition: "Lubricating oil fractions reduce friction between moving parts in machinery and engines.", example: "<strong>Example:</strong> Engine oil (SAE 20W-40), gear oil, and grease are lubricating products. They also help in cooling engine parts.", tags: ["lubricant", "oil", "friction", "engine"] },
                    { name: "Paraffin Wax", definition: "Paraffin wax is a white solid fraction from petroleum used in candles, coatings, and waterproofing.", example: "<strong>Example:</strong> Candles are made of paraffin wax. Wax coating on fruits for preservation. Used in crayons and polishes.", tags: ["paraffin", "wax", "candle", "coating"] },
                    { name: "Bitumen (Asphalt)", definition: "Bitumen is the heaviest, thickest fraction from petroleum distillation, used for road surfacing.", example: "<strong>Example:</strong> Roads are paved with bitumen mixed with gravel (asphalt concrete). Roofing felt is impregnated with bitumen for waterproofing.", tags: ["bitumen", "asphalt", "road", "tar"] },
                    { name: "Natural Gas", definition: "Natural gas is a fossil fuel composed mainly of methane (CH₄), found associated with petroleum deposits.", example: "<strong>Example:</strong> CNG (Compressed Natural Gas) for vehicles. PNG (Piped Natural Gas) for cooking. Cleanest burning fossil fuel.", tags: ["natural gas", "methane", "CNG", "clean"] },
                    { name: "CNG (Compressed Natural Gas)", definition: "CNG is natural gas compressed to high pressure, used as a cleaner vehicle fuel alternative to petrol/diesel.", example: "<strong>Example:</strong> Auto-rickshaws and buses in Delhi run on CNG. CNG produces less CO₂ and pollutants than petrol. Stored in high-pressure cylinders.", tags: ["CNG", "compressed", "vehicle", "clean fuel"] },
                    { name: "Conservation of Fossil Fuels", definition: "Fossil fuels are non-renewable and limited. Conservation ensures availability for future generations.", example: "<strong>Example:</strong> Using public transport, carpooling, and cycling saves fuel. Switching to renewable energy (solar, wind) reduces fossil fuel dependence.", tags: ["conservation", "save", "non-renewable", "sustainable"] },
                    { name: "Petroleum Conservation Research Association (PCRA)", definition: "PCRA promotes fuel conservation in India through awareness campaigns and efficiency tips.", example: "<strong>Example:</strong> PCRA advises: maintain correct tire pressure, drive at steady speed, switch off engine at red lights to save fuel.", tags: ["PCRA", "conservation", "India", "awareness"] },
                    { name: "Fuel Efficiency", definition: "Fuel efficiency measures how much distance a vehicle can travel per unit of fuel (km/L or km/kg).", example: "<strong>Example:</strong> Maruti Suzuki cars advertise 20-25 km/L petrol. Electric vehicles have no direct fuel consumption but use electricity.", tags: ["efficiency", "mileage", "km/L", "vehicle"] },
                    { name: "Octane Number", definition: "Octane number measures a fuel's ability to resist engine knocking (premature ignition). Higher is better.", example: "<strong>Example:</strong> Premium petrol has octane number 91-93. Regular petrol is 87. Benzene and toluene improve octane rating.", tags: ["octane", "knocking", "premium", "petrol"] },
                    { name: "Cetane Number", definition: "Cetane number measures diesel's ignition quality. Higher cetane means easier ignition in diesel engines.", example: "<strong>Example:</strong> Standard diesel has cetane number 45-55. Higher cetane diesel gives smoother engine operation and less smoke.", tags: ["cetane", "diesel", "ignition", "engine"] }
                ]
            },
            {
                chapter: "Combustion and Flame",
                icon: "fa-fire",
                topics: [
                    { name: "Combustion", definition: "Combustion is a chemical reaction between a fuel and oxygen that releases energy as heat and light.", example: "<strong>Example:</strong> Burning of candle wax: C₂₅H₅₂ + 38O₂ → 25CO₂ + 26H₂O + energy. All combustion reactions are exothermic.", tags: ["combustion", "fuel", "oxygen", "exothermic"] },
                    { name: "Fuel", definition: "A fuel is any substance that reacts with oxygen to produce useful heat energy through combustion.", example: "<strong>Example:</strong> Wood, coal, petrol, diesel, LPG, CNG, and hydrogen are fuels. Food is fuel for our body (cellular respiration).", tags: ["fuel", "substance", "energy", "heat"] },
                    { name: "Ignition Temperature", definition: "The minimum temperature at which a fuel catches fire and starts burning in the presence of air.", example: "<strong>Example:</strong> White phosphorus ignites at 35°C (room temp). Paper ignites at 233°C (451°F). Kerosene ignites at 220°C.", tags: ["ignition", "temperature", "catch fire", "minimum"] },
                    { name: "Inflammable Substances", definition: "Inflammable substances have very low ignition temperatures and can catch fire easily.", example: "<strong>Example:</strong> Petrol, alcohol, LPG, and acetone are inflammable. They must be stored away from heat sources and open flames.", tags: ["inflammable", "low ignition", "dangerous", "petrol"] },
                    { name: "Rapid Combustion", definition: "Rapid combustion occurs when a fuel burns quickly, producing a large amount of heat and light in a short time.", example: "<strong>Example:</strong> Burning of LPG in kitchen stove. Matchstick burning. Gas burner produces instant heat through rapid combustion.", tags: ["rapid", "quick", "heat", "light"] },
                    { name: "Spontaneous Combustion", definition: "Spontaneous combustion occurs when a material catches fire without any external heat source due to internal heat buildup.", example: "<strong>Example:</strong> Coal dust in mines can spontaneously ignite. Haystacks may catch fire due to bacterial fermentation heat. Linseed oil rags.", tags: ["spontaneous", "self-ignite", "internal heat", "coal"] },
                    { name: "Explosion", definition: "An explosion is a sudden, violent combustion producing a large volume of gases, heat, and a shock wave.", example: "<strong>Example:</strong> Firecrackers explode due to rapid combustion of gunpowder. Dust explosions in flour mills. Gas cylinder explosions.", tags: ["explosion", "sudden", "shock wave", "firecracker"] },
                    { name: "Fire Triangle", definition: "The fire triangle represents the three conditions needed for fire: fuel, oxygen (air), and heat (ignition temperature).", example: "<strong>Example:</strong> To extinguish fire, remove any one element: water removes heat, CO₂ removes oxygen, removing fuel stops fire.", tags: ["triangle", "fuel", "oxygen", "heat", "conditions"] },
                    { name: "Fire Extinguisher", definition: "A fire extinguisher is a device that sprays CO₂ or foam to cut off oxygen supply and cool the burning material.", example: "<strong>Example:</strong> CO₂ extinguisher for electrical fires. Water extinguisher for wood/paper fires. Foam extinguisher for oil/petrol fires.", tags: ["extinguisher", "CO2", "foam", "safety"] },
                    { name: "Water as Fire Extinguisher", definition: "Water cools the burning material below its ignition temperature. It cannot be used on electrical or oil fires.", example: "<strong>Example:</strong> Water on wood fire works by cooling. Water on oil fire spreads it (oil floats on water). Water conducts electricity (dangerous).", tags: ["water", "cool", "extinguish", "limitations"] },
                    { name: "CO₂ for Fire Fighting", definition: "Carbon dioxide is heavier than air, forms a blanket over fire, cutting off oxygen. It's non-conductive.", example: "<strong>Example:</strong> CO₂ extinguishers are best for electrical fires. Baking soda (NaHCO₃) releases CO₂ on heating: 2NaHCO₃ → Na₂CO₃ + CO₂ + H₂O.", tags: ["CO2", "blanket", "oxygen cut", "electrical"] },
                    { name: "Candle Flame Structure", definition: "A candle flame has three zones: innermost dark zone (unburnt wax), middle luminous zone, and outermost non-luminous zone.", example: "<strong>Example:</strong> Outer zone is blue, hottest (complete combustion). Middle zone is yellow, luminous (partial combustion). Inner zone is dark, cool.", tags: ["candle", "flame", "zones", "luminous"] },
                    { name: "Luminous Flame", definition: "A luminous flame is yellow and bright due to incomplete combustion, producing unburnt carbon particles (soot).", example: "<strong>Example:</strong> Candle flame and oil lamps produce luminous flames. Carbon particles glow yellow when heated, giving the flame brightness.", tags: ["luminous", "yellow", "soot", "incomplete"] },
                    { name: "Non-luminous Flame", definition: "A non-luminous flame is blue, clean, and produces little light but more heat due to complete combustion.", example: "<strong>Example:</strong> Bunsen burner with air hole open gives blue flame. LPG stove flame is blue. Complete combustion: fuel + O₂ → CO₂ + H₂O.", tags: ["non-luminous", "blue", "complete", "hot"] },
                    { name: "Complete Combustion", definition: "Complete combustion occurs when fuel burns in sufficient oxygen, producing only CO₂ and H₂O as products.", example: "<strong>Example:</strong> LPG blue flame: C₄H₁₀ + 6.5O₂ → 4CO₂ + 5H₂O. No smoke or soot is produced in complete combustion.", tags: ["complete", "sufficient oxygen", "CO2", "blue flame"] },
                    { name: "Incomplete Combustion", definition: "Incomplete combustion occurs when oxygen supply is limited, producing carbon monoxide (CO) and soot (C).", example: "<strong>Example:</strong> Car engine in closed garage produces deadly CO. Yellow candle flame produces soot. CO is a poisonous gas.", tags: ["incomplete", "carbon monoxide", "soot", "poisonous"] },
                    { name: "Calorific Value", definition: "Calorific value is the amount of heat energy produced by complete combustion of 1 kg of fuel. Unit: kJ/kg.", example: "<strong>Example:</strong> Hydrogen: 150,000 kJ/kg (highest). LPG: 55,000 kJ/kg. Petrol: 45,000 kJ/kg. Wood: 17,000 kJ/kg.", tags: ["calorific", "value", "heat", "kJ/kg"] },
                    { name: "Ideal Fuel", definition: "An ideal fuel has high calorific value, moderate ignition temperature, and burns without pollution.", example: "<strong>Example:</strong> LPG and CNG are near-ideal fuels: high calorific value, clean burning, easy to transport. Hydrogen is ideal but difficult to store.", tags: ["ideal", "fuel", "high calorific", "clean"] },
                    { name: "Soot", definition: "Soot is fine black carbon particles produced during incomplete combustion, seen as smoke.", example: "<strong>Example:</strong> Black deposit on bottom of cooking vessels from yellow flame. Diesel vehicles emit soot. Used in making printer ink.", tags: ["soot", "carbon", "black", "incomplete"] },
                    { name: "Global Warming from Combustion", definition: "CO₂ released from fossil fuel combustion traps heat in atmosphere, causing global warming and climate change.", example: "<strong>Example:</strong> Coal power plants emit CO₂. Vehicle exhaust contributes to greenhouse effect. Switching to renewables reduces emissions.", tags: ["global warming", "CO2", "climate", "greenhouse"] },
                    { name: "Acid Rain from Combustion", definition: "Burning fossil fuels releases SO₂ and NOₓ, which react with water in clouds to form acid rain.", example: "<strong>Example:</strong> Coal contains sulfur: S + O₂ → SO₂ → H₂SO₄ in rain. Acid rain damages buildings (Taj Mahal), forests, and lakes.", tags: ["acid rain", "SO2", "NOx", "pollution"] },
                    { name: "Fire Control Methods", definition: "Fire can be controlled by removing any one element of the fire triangle: fuel, heat, or oxygen.", example: "<strong>Example:</strong> Fire blanket smothers fire (removes O₂). Sprinklers spray water (removes heat). Creating firebreaks removes fuel.", tags: ["control", "remove", "triangle", "extinguish"] },
                    { name: "Flash Point", definition: "Flash point is the lowest temperature at which a liquid fuel produces enough vapor to ignite.", example: "<strong>Example:</strong> Petrol flash point: -43°C (ignites easily). Diesel flash point: 52°C (harder to ignite). Higher flash point means safer storage.", tags: ["flash point", "vapor", "ignite", "temperature"] },
                    { name: "Autoignition Temperature", definition: "Autoignition temperature is when a substance spontaneously ignites without external ignition source.", example: "<strong>Example:</strong> Diesel autoignites at 210°C (works in compression engines). Petrol autoignites at 247°C. This is different from flash point.", tags: ["autoignition", "spontaneous", "temperature", "diesel"] },
                    { name: "Smokeless Fuel", definition: "Smokeless fuels produce minimal visible smoke when burned, having low volatile matter content.", example: "<strong>Example:</strong> Coke and anthracite are smokeless fuels. Used in areas with smoke control regulations. Produce more heat per unit.", tags: ["smokeless", "coke", "anthracite", "clean"] }
                ]
            },
            {
                chapter: "Synthetic Fibres and Plastics",
                icon: "fa-shirt",
                topics: [
                    { name: "Polymer", definition: "A polymer is a large molecule made of many repeating small units called monomers joined together.", example: "<strong>Example:</strong> Polyethene is made from ethene monomers: n(CH₂=CH₂) → -(CH₂-CH₂)n-. Cotton and silk are natural polymers.", tags: ["polymer", "monomer", "repeating", "large molecule"] },
                    { name: "Monomer", definition: "A monomer is a small molecule that can chemically bond to other monomers to form a polymer chain.", example: "<strong>Example:</strong> Ethene (C₂H₄) is monomer for polythene. Vinyl chloride for PVC. Styrene for polystyrene.", tags: ["monomer", "small", "unit", "building block"] },
                    { name: "Polymerization", definition: "Polymerization is the chemical reaction where monomers link together to form long polymer chains.", example: "<strong>Example:</strong> Addition polymerization: many ethene molecules join to make polyethene. Condensation polymerization releases small molecules like water.", tags: ["polymerization", "link", "chain", "reaction"] },
                    { name: "Rayon (Artificial Silk)", definition: "Rayon is a semi-synthetic fibre made from wood pulp (cellulose) treated with chemicals. It mimics silk.", example: "<strong>Example:</strong> Rayon sarees and dresses. Rayon is used in carpets and bandages. It's cheaper than silk but looks similar.", tags: ["rayon", "artificial silk", "cellulose", "wood pulp"] },
                    { name: "Nylon", definition: "Nylon is the first fully synthetic fibre, made from coal, water, and air. It's strong, elastic, and lightweight.", example: "<strong>Example:</strong> Nylon ropes are used in mountaineering. Parachutes, fishing nets, toothbrush bristles, and zip fasteners use nylon.", tags: ["nylon", "synthetic", "strong", "elastic"] },
                    { name: "Polyester", definition: "Polyester is a synthetic fibre made from petrochemicals, known for wrinkle resistance and durability.", example: "<strong>Example:</strong> Terylene and PET are polyesters. Shirts, suits, and sarees use polyester. PET bottles are made of polyester.", tags: ["polyester", "terylene", "PET", "wrinkle free"] },
                    { name: "Acrylic", definition: "Acrylic is a synthetic fibre that resembles wool, made from acrylonitrile. It's lightweight and warm.", example: "<strong>Example:</strong> Acrylic sweaters and shawls are cheaper alternatives to wool. Used in making carpets and blankets.", tags: ["acrylic", "wool-like", "acrylonitrile", "warm"] },
                    { name: "Spandex (Lycra)", definition: "Spandex is an elastic synthetic fibre that can stretch up to 500% and return to original shape.", example: "<strong>Example:</strong> Sportswear, swimwear, and tights contain spandex. Used in medical compression garments and waistbands.", tags: ["spandex", "lycra", "elastic", "stretch"] },
                    { name: "Thermoplastics", definition: "Thermoplastics soften on heating and harden on cooling. This process can be repeated many times.", example: "<strong>Example:</strong> Polythene, PVC, polystyrene, and nylon are thermoplastics. Recyclable. Used in bags, bottles, and toys.", tags: ["thermoplastic", "soften", "reheat", "recycle"] },
                    { name: "Thermosetting Plastics", definition: "Thermosetting plastics set permanently on heating and cannot be reshaped. They are cross-linked polymers.", example: "<strong>Example:</strong> Bakelite (electrical switches), melamine (kitchenware). Once molded, cannot be softened by reheating.", tags: ["thermoset", "permanent", "cross-linked", "bakelite"] },
                    { name: "Polythene (Polyethylene)", definition: "Polythene is the most common thermoplastic made from ethene, used in plastic bags and packaging.", example: "<strong>Example:</strong> Shopping bags, milk jugs, shampoo bottles are made of polythene. LDPE (low density) and HDPE (high density) varieties exist.", tags: ["polythene", "polyethylene", "bags", "packaging"] },
                    { name: "PVC (Polyvinyl Chloride)", definition: "PVC is a versatile thermoplastic used in pipes, cables, flooring, and medical equipment.", example: "<strong>Example:</strong> Water pipes, electrical insulation, raincoats, and credit cards. Flexible PVC used in hoses and blood bags.", tags: ["PVC", "polyvinyl chloride", "pipes", "cables"] },
                    { name: "Polystyrene", definition: "Polystyrene is a lightweight plastic used in packaging, insulation, and disposable containers.", example: "<strong>Example:</strong> Thermocol (expanded polystyrene) for packaging. Disposable cups and plates. CD jewel cases.", tags: ["polystyrene", "thermocol", "foam", "disposable"] },
                    { name: "Bakelite", definition: "Bakelite was the first synthetic thermosetting plastic, invented by Leo Baekeland. Heat and electrical insulator.", example: "<strong>Example:</strong> Electrical switches, handles of cookware, old telephones, and radio cabinets used bakelite.", tags: ["bakelite", "thermoset", "insulator", "switch"] },
                    { name: "Melamine", definition: "Melamine is a thermosetting plastic resistant to heat and fire, used in kitchenware and laminates.", example: "<strong>Example:</strong> Melamine plates and cups (unbreakable). Floor tiles and whiteboards use melamine coating.", tags: ["melamine", "kitchenware", "heat resistant", "unbreakable"] },
                    { name: "PET (Polyethylene Terephthalate)", definition: "PET is a clear, strong polyester used for bottles and food containers. Highly recyclable.", example: "<strong>Example:</strong> Soft drink bottles, water bottles, and food jars. Recycled into polyester fibre for clothing.", tags: ["PET", "bottles", "recyclable", "polyester"] },
                    { name: "Teflon (PTFE)", definition: "Teflon is a non-stick, heat-resistant fluoropolymer coating used on cookware.", example: "<strong>Example:</strong> Non-stick frying pans and tawa. Industrial seals and gaskets. Waterproof coating on fabrics.", tags: ["teflon", "PTFE", "non-stick", "coating"] },
                    { name: "Biodegradable Plastics", definition: "Biodegradable plastics break down naturally by microorganisms, reducing environmental pollution.", example: "<strong>Example:</strong> PLA (polylactic acid) made from corn starch. Used in compostable bags and disposable cutlery.", tags: ["biodegradable", "PLA", "compostable", "environment"] },
                    { name: "Microplastics", definition: "Microplastics are tiny plastic particles (<5mm) formed by breakdown of larger plastics, polluting water bodies.", example: "<strong>Example:</strong> Microbeads in face scrubs (now banned). Fibres from synthetic clothes washing into oceans. Found in fish and sea salt.", tags: ["microplastics", "pollution", "tiny", "ocean"] },
                    { name: "Plastic Recycling", definition: "Plastic recycling reprocesses waste plastic into new products, reducing landfill and environmental impact.", example: "<strong>Example:</strong> PET bottles recycled into polyester clothing. Recycling codes (1-7) on plastic items indicate plastic type for sorting.", tags: ["recycling", "reprocess", "waste", "codes"] },
                    { name: "4R Principle", definition: "Reduce, Reuse, Recycle, and Recover — the 4R principle for sustainable waste management.", example: "<strong>Example:</strong> Reduce: use cloth bags. Reuse: refill plastic bottles. Recycle: convert waste to new products. Recover: energy from waste.", tags: ["4R", "reduce", "reuse", "recycle", "recover"] },
                    { name: "Plastic Pollution", definition: "Plastic pollution is the accumulation of plastic waste in the environment, harming wildlife and ecosystems.", example: "<strong>Example:</strong> Plastic bags choking marine animals. Microplastics entering food chain. Single-use plastics banned in many countries.", tags: ["pollution", "plastic", "environment", "ban"] },
                    { name: "Natural Fibres", definition: "Natural fibres are obtained from plants (cotton, jute) or animals (wool, silk) without chemical synthesis.", example: "<strong>Example:</strong> Cotton from cotton plant bolls. Wool from sheep fleece. Silk from silkworm cocoons. Jute from jute plant stem.", tags: ["natural", "cotton", "wool", "silk", "plant"] },
                    { name: "Synthetic vs Natural Fibres", definition: "Synthetic fibres are man-made from chemicals; natural fibres come from nature. Each has advantages.", example: "<strong>Example:</strong> Synthetic: durable, cheap, wrinkle-free but non-biodegradable. Natural: biodegradable, breathable but may shrink or wrinkle.", tags: ["comparison", "synthetic", "natural", "properties"] }
                ]
            },
            {
                chapter: "Materials: States and Properties",
                icon: "fa-atom",
                topics: [
                    { name: "Solid State", definition: "Solids have fixed shape and volume. Particles are tightly packed in a regular arrangement with strong forces.", example: "<strong>Example:</strong> Ice, wood, iron nail, and table salt are solids. Particles vibrate in fixed positions. Solids have highest density.", tags: ["solid", "fixed shape", "packed", "vibrate"] },
                    { name: "Liquid State", definition: "Liquids have fixed volume but take the shape of container. Particles are close but can move past each other.", example: "<strong>Example:</strong> Water, milk, oil, and mercury are liquids. Liquids flow and can be poured. Density between solid and gas.", tags: ["liquid", "flow", "fixed volume", "container shape"] },
                    { name: "Gas State", definition: "Gases have no fixed shape or volume. Particles are far apart, moving randomly at high speeds.", example: "<strong>Example:</strong> Air, oxygen, helium, and steam are gases. Gases expand to fill any container. Highly compressible.", tags: ["gas", "no shape", "compressible", "expand"] },
                    { name: "Plasma State", definition: "Plasma is the fourth state of matter - ionized gas with free electrons and ions, conducting electricity.", example: "<strong>Example:</strong> Stars (including Sun) are plasma. Neon signs contain plasma. Lightning creates plasma channel in air.", tags: ["plasma", "ionized", "electrons", "stars"] },
                    { name: "Bose-Einstein Condensate", definition: "BEC is a fifth state of matter formed at temperatures near absolute zero where atoms behave as one entity.", example: "<strong>Example:</strong> Created in labs at billionths of a degree above -273.15°C. Predicted by Bose and Einstein in 1924-25.", tags: ["BEC", "absolute zero", "quantum", "coldest"] },
                    { name: "Melting", definition: "Melting is the change from solid to liquid state at a specific temperature (melting point).", example: "<strong>Example:</strong> Ice melts to water at 0°C. Butter melts on hot toast. Candle wax melts when candle burns.", tags: ["melting", "solid to liquid", "temperature", "fusion"] },
                    { name: "Freezing", definition: "Freezing is the change from liquid to solid state when temperature drops below freezing point.", example: "<strong>Example:</strong> Water freezes to ice at 0°C. Molten iron solidifies when cooled. Lava solidifies into rock.", tags: ["freezing", "liquid to solid", "temperature", "solidification"] },
                    { name: "Boiling", definition: "Boiling is the rapid change from liquid to gas throughout the liquid at the boiling point temperature.", example: "<strong>Example:</strong> Water boils at 100°C at sea level. Bubbles of steam form throughout the liquid during boiling.", tags: ["boiling", "liquid to gas", "bubbles", "evaporation"] },
                    { name: "Evaporation", definition: "Evaporation is the slow change from liquid to gas at the surface, occurring at any temperature below boiling point.", example: "<strong>Example:</strong> Drying of wet clothes. Sweat evaporating from skin cools the body. Puddles drying after rain.", tags: ["evaporation", "surface", "slow", "cooling"] },
                    { name: "Condensation", definition: "Condensation is the change from gas to liquid when vapor cools below its dew point.", example: "<strong>Example:</strong> Water droplets on cold drink glass. Morning dew on grass. Clouds forming from water vapor.", tags: ["condensation", "gas to liquid", "dew", "clouds"] },
