                    { name: "Sublimation", definition: "Sublimation is the direct change from solid to gas without passing through liquid state.", example: "<strong>Example:</strong> Camphor disappears without leaving residue. Dry ice (solid CO₂) sublimates. Naphthalene balls shrink over time.", tags: ["sublimation", "solid to gas", "camphor", "dry ice"] },
                    { name: "Deposition", definition: "Deposition is the direct change from gas to solid without becoming liquid (reverse of sublimation).", example: "<strong>Example:</strong> Frost forming on cold surfaces. Snowflakes forming in clouds. Soot depositing on chimney walls.", tags: ["deposition", "gas to solid", "frost", "snow"] },
                    { name: "Physical Change", definition: "A physical change alters the form or appearance of a substance but not its chemical composition.", example: "<strong>Example:</strong> Melting ice (H₂O remains H₂O). Tearing paper. Dissolving sugar in water. Stretching a rubber band.", tags: ["physical", "reversible", "appearance", "no new substance"] },
                    { name: "Chemical Change", definition: "A chemical change produces one or more new substances with different properties. Usually irreversible.", example: "<strong>Example:</strong> Rusting of iron (iron becomes iron oxide). Burning of wood. Cooking of food. Curdling of milk.", tags: ["chemical", "new substance", "irreversible", "reaction"] },
                    { name: "Diffusion", definition: "Diffusion is the movement of particles from higher concentration to lower concentration until evenly spread.", example: "<strong>Example:</strong> Perfume smell spreading in room. Ink drop spreading in water. Tea flavor diffusing into hot water.", tags: ["diffusion", "movement", "concentration", "spread"] },
                    { name: "Density Formula", definition: "Density = Mass / Volume. It measures how tightly matter is packed in a substance.", example: "<strong>Example:</strong> Water density: 1 g/cm³. Objects with density <1 float (wood, oil). Objects with density >1 sink (iron, stone).", tags: ["density", "mass", "volume", "float", "sink"] },
                    { name: "Compressibility", definition: "Compressibility is the ability to reduce volume under pressure. Gases highly compressible; solids and liquids nearly incompressible.", example: "<strong>Example:</strong> LPG compressed into cylinders. Air compressed in bicycle pump. Hydraulic systems use incompressible liquids.", tags: ["compressibility", "pressure", "volume", "gases"] },
                    { name: "Fluidity", definition: "Fluidity is the ability to flow. Liquids and gases are fluids; solids are not (they are rigid).", example: "<strong>Example:</strong> Water and oil flow (fluids). Glass appears solid but flows extremely slowly over centuries (amorphous solid).", tags: ["fluidity", "flow", "liquid", "gas", "rigid"] },
                    { name: "Viscosity", definition: "Viscosity is the resistance of a fluid to flow. Honey has high viscosity; water has low viscosity.", example: "<strong>Example:</strong> Honey flows slowly (high viscosity). Water flows easily (low viscosity). Motor oil viscosity rated as 20W-40.", tags: ["viscosity", "resistance", "flow", "thick", "thin"] },
                    { name: "Surface Tension", definition: "Surface tension is the tendency of liquid surfaces to shrink into minimum surface area, behaving like a stretched membrane.", example: "<strong>Example:</strong> Water strider insects walking on water. Small droplets form spheres. Soap reduces surface tension for cleaning.", tags: ["surface tension", "membrane", "droplet", "soap"] },
                    { name: "Capillary Action", definition: "Capillary action is the rise or fall of liquid in narrow tubes due to adhesion and cohesion forces.", example: "<strong>Example:</strong> Water rising in plant roots and stems. Ink in fountain pen nib. Oil rising in lamp wick.", tags: ["capillary", "rise", "tube", "adhesion"] },
                    { name: "Solubility", definition: "Solubility is the maximum amount of solute that can dissolve in a given amount of solvent at a specific temperature.", example: "<strong>Example:</strong> 36g NaCl dissolves in 100g water at 20°C. Sugar is more soluble in hot water than cold. Oil is insoluble in water.", tags: ["solubility", "dissolve", "solute", "solvent"] },
                    { name: "Saturated Solution", definition: "A saturated solution cannot dissolve any more solute at a given temperature. Excess solute settles.", example: "<strong>Example:</strong> Adding salt to water until it stops dissolving. Sugar crystals at bottom of iced tea indicate saturation.", tags: ["saturated", "maximum", "dissolved", "excess"] },
                    { name: "Supersaturated Solution", definition: "A supersaturated solution contains more dissolved solute than normally possible at that temperature (metastable).", example: "<strong>Example:</strong> Sodium acetate hand warmers crystallize on clicking, releasing heat. Honey sometimes crystallizes when supersaturated.", tags: ["supersaturated", "metastable", "crystallize", "excess"] },
                    { name: "Crystallization", definition: "Crystallization is the process where dissolved solute comes out of solution as pure solid crystals.", example: "<strong>Example:</strong> Salt crystals from evaporating seawater. Sugar crystals (rock candy). Copper sulfate crystals are blue.", tags: ["crystallization", "crystals", "pure", "evaporation"] }
                ]
            },
            {
                chapter: "Acids, Bases and Indicators",
                icon: "fa-vial-circle-check",
                topics: [
                    { name: "Acids", definition: "Acids are substances that taste sour and turn blue litmus red. They release H⁺ ions in water.", example: "<strong>Example:</strong> Lemon juice (citric acid), vinegar (acetic acid), stomach acid (HCl), tamarind (tartaric acid).", tags: ["acid", "sour", "H+", "litmus red"] },
                    { name: "Bases", definition: "Bases taste bitter, feel soapy, and turn red litmus blue. They release OH⁻ ions in water.", example: "<strong>Example:</strong> Baking soda (NaHCO₃), soap, washing soda (Na₂CO₃), milk of magnesia (Mg(OH)₂).", tags: ["base", "bitter", "OH-", "litmus blue"] },
                    { name: "Indicators", definition: "Indicators are substances that change color in acidic or basic solutions, used to test pH.", example: "<strong>Example:</strong> Litmus (blue→red in acid, red→blue in base). Turmeric (yellow in acid, red in base). Phenolphthalein (colorless→pink in base).", tags: ["indicator", "color change", "litmus", "turmeric"] },
                    { name: "Natural Indicators", definition: "Natural indicators are obtained from plants and change color with pH. They're easily available.", example: "<strong>Example:</strong> Red cabbage juice (red in acid, purple in neutral, green/yellow in base). Beetroot, grape juice, and turmeric are natural indicators.", tags: ["natural", "plant", "red cabbage", "turmeric"] },
                    { name: "Olfactory Indicators", definition: "Olfactory indicators change their smell when mixed with acids or bases (detectable by nose).", example: "<strong>Example:</strong> Onion smell diminishes in base but remains in acid. Vanilla essence smell disappears in base. Clove oil smell changes.", tags: ["olfactory", "smell", "onion", "vanilla"] },
                    { name: "Universal Indicator", definition: "Universal indicator is a mixture of several indicators showing different colors across the pH scale.", example: "<strong>Example:</strong> pH paper strips turn colors from red (pH 1) to violet (pH 14). Used to measure approximate pH of solutions.", tags: ["universal", "pH", "paper", "color range"] },
                    { name: "pH Scale", definition: "The pH scale (0-14) measures acidity or basicity. pH < 7 acidic, pH = 7 neutral, pH > 7 basic.", example: "<strong>Example:</strong> Lemon juice pH 2, pure water pH 7, soap pH 10. Stomach acid pH 1-2. Blood pH 7.35-7.45.", tags: ["pH", "scale", "acidic", "neutral", "basic"] },
                    { name: "Neutral Solution", definition: "A neutral solution has equal concentrations of H⁺ and OH⁻ ions, giving pH = 7.", example: "<strong>Example:</strong> Pure water is neutral. Salt (NaCl) solution is neutral. Sugar solution is neutral.", tags: ["neutral", "pH 7", "water", "equal"] },
                    { name: "Neutralization Reaction", definition: "Neutralization is the reaction between an acid and a base to produce salt and water: Acid + Base → Salt + Water.", example: "<strong>Example:</strong> HCl + NaOH → NaCl + H₂O. Antacids neutralize excess stomach acid. Lime treatment neutralizes acidic soil.", tags: ["neutralization", "acid+base", "salt", "water"] },
                    { name: "Salts", definition: "Salts are ionic compounds formed from the neutralization of an acid by a base.", example: "<strong>Example:</strong> NaCl (table salt), CaSO₄ (gypsum), KNO₃ (saltpeter), NaHCO₃ (baking soda), CuSO₄ (copper sulfate).", tags: ["salt", "ionic", "neutralization", "compound"] },
                    { name: "Common Salt (NaCl)", definition: "Sodium chloride is common table salt, formed from HCl + NaOH. Essential for life.", example: "<strong>Example:</strong> Obtained from seawater evaporation. Used in food preservation and as raw material for many chemicals.", tags: ["NaCl", "table salt", "seawater", "preservation"] },
                    { name: "Baking Soda (NaHCO₃)", definition: "Sodium bicarbonate is a mild base used in baking, antacids, and fire extinguishers.", example: "<strong>Example:</strong> Baking soda + acid → CO₂ makes cakes fluffy. Antacid for indigestion. In soda-acid fire extinguisher.", tags: ["baking soda", "NaHCO3", "antacid", "CO2"] },
                    { name: "Washing Soda (Na₂CO₃)", definition: "Sodium carbonate is used for washing, water softening, and glass manufacturing.", example: "<strong>Example:</strong> Washing soda removes permanent hardness of water. Used in paper and soap industries.", tags: ["washing soda", "Na2CO3", "cleaning", "water softening"] },
                    { name: "Plaster of Paris (CaSO₄·½H₂O)", definition: "Plaster of Paris is calcium sulfate hemihydrate that sets into a hard mass when mixed with water.", example: "<strong>Example:</strong> Used for making casts for broken bones. Making statues and decorative ceiling designs. Setting time: 10-15 minutes.", tags: ["POP", "plaster", "gypsum", "cast"] },
                    { name: "Acid Rain", definition: "Acid rain has pH below 5.6 due to dissolved SO₂ and NOₓ from industrial pollution.", example: "<strong>Example:</strong> Acid rain corrodes marble (Taj Mahal damage). Acidifies lakes killing fish. Damages forests and crops.", tags: ["acid rain", "pollution", "SO2", "marble"] },
                    { name: "Antacids", definition: "Antacids are mild bases that neutralize excess stomach acid (HCl) to relieve indigestion.", example: "<strong>Example:</strong> Milk of magnesia (Mg(OH)₂). Baking soda (NaHCO₃). Aluminum hydroxide gel. Calcium carbonate tablets.", tags: ["antacid", "stomach", "indigestion", "milk of magnesia"] },
                    { name: "Strong Acid", definition: "Strong acids completely dissociate in water, releasing all H⁺ ions. They are highly corrosive.", example: "<strong>Example:</strong> Hydrochloric acid (HCl), sulfuric acid (H₂SO₄), nitric acid (HNO₃). Used in labs and industry carefully.", tags: ["strong acid", "dissociate", "corrosive", "HCl"] },
                    { name: "Weak Acid", definition: "Weak acids partially dissociate in water. They have higher pH than strong acids at same concentration.", example: "<strong>Example:</strong> Acetic acid (vinegar), citric acid (lemons), carbonic acid (soda). Found in foods and beverages.", tags: ["weak acid", "partial", "vinegar", "citric"] },
                    { name: "Strong Base", definition: "Strong bases completely dissociate in water releasing all OH⁻ ions. They are caustic.", example: "<strong>Example:</strong> Sodium hydroxide (NaOH, caustic soda), potassium hydroxide (KOH). Used in soap making and drain cleaners.", tags: ["strong base", "caustic", "NaOH", "KOH"] },
                    { name: "Weak Base", definition: "Weak bases partially dissociate in water. They are milder and often found in household products.", example: "<strong>Example:</strong> Ammonia (NH₃), baking soda (NaHCO₃), milk of magnesia (Mg(OH)₂). Soap is a weak base.", tags: ["weak base", "partial", "ammonia", "soap"] },
                    { name: "Concentrated Acid", definition: "Concentrated acid has a high amount of acid dissolved in less water. Different from strong acid.", example: "<strong>Example:</strong> Concentrated HCl is 37% HCl in water. Dilution reduces concentration but doesn't change strength.", tags: ["concentrated", "dilute", "amount", "water"] },
                    { name: "Dilute Acid", definition: "Dilute acid has a small amount of acid dissolved in more water. Safer to handle than concentrated acid.", example: "<strong>Example:</strong> Dilute HCl used in lab experiments. Adding water to concentrated acid must be done carefully (acid to water).", tags: ["dilute", "less acid", "safe", "water"] },
                    { name: "Acid-Base Titration", definition: "Titration determines the concentration of an acid/base by neutralizing with a base/acid of known concentration.", example: "<strong>Example:</strong> Using phenolphthalein indicator, NaOH solution added to vinegar until pink color appears to find acetic acid content.", tags: ["titration", "concentration", "neutralize", "phenolphthalein"] }
                ]
            },
            {
                chapter: "Environmental Chemistry",
                icon: "fa-leaf",
                topics: [
                    { name: "Air Pollution", definition: "Air pollution is the contamination of air by harmful substances including gases, particulates, and biological molecules.", example: "<strong>Example:</strong> Vehicle exhaust (CO, NOₓ). Factory smoke (SO₂). Burning of crop residue. Delhi smog in winter.", tags: ["air", "pollution", "smog", "vehicles"] },
                    { name: "Water Pollution", definition: "Water pollution is contamination of water bodies by harmful substances making it unfit for use.", example: "<strong>Example:</strong> Industrial effluents in rivers. Oil spills in oceans. Agricultural runoff with pesticides and fertilizers.", tags: ["water", "pollution", "effluent", "river"] },
                    { name: "Greenhouse Effect", definition: "The greenhouse effect is the trapping of heat by gases like CO₂ and methane, warming Earth's surface.", example: "<strong>Example:</strong> CO₂ from fossil fuels increases greenhouse effect. Venus has runaway greenhouse effect (surface 462°C).", tags: ["greenhouse", "CO2", "methane", "warming"] },
                    { name: "Ozone Layer Depletion", definition: "Ozone layer depletion is the thinning of stratospheric ozone by CFCs, allowing harmful UV radiation to reach Earth.", example: "<strong>Example:</strong> CFCs used in refrigerators and aerosol sprays destroy ozone. Montreal Protocol (1987) banned CFCs.", tags: ["ozone", "CFC", "UV", "depletion"] },
                    { name: "Carbon Footprint", definition: "Carbon footprint is the total amount of greenhouse gases produced directly and indirectly by human activities.", example: "<strong>Example:</strong> Driving petrol car = higher footprint. Using public transport = lower footprint. Plant-based diet reduces footprint.", tags: ["carbon", "footprint", "emissions", "CO2"] },
                    { name: "Renewable Energy", definition: "Renewable energy comes from sources that are naturally replenished like sun, wind, water, and biomass.", example: "<strong>Example:</strong> Solar panels convert sunlight to electricity. Wind turbines. Hydroelectric dams. Geothermal energy.", tags: ["renewable", "solar", "wind", "hydro"] },
                    { name: "Non-renewable Energy", definition: "Non-renewable energy sources are finite and cannot be replenished in human timescales.", example: "<strong>Example:</strong> Coal, petroleum, natural gas, and nuclear fuels (uranium). Once used, they cannot be replaced quickly.", tags: ["non-renewable", "finite", "coal", "petroleum"] },
                    { name: "Eutrophication", definition: "Eutrophication is excessive nutrient enrichment of water bodies causing algal blooms and oxygen depletion.", example: "<strong>Example:</strong> Fertilizer runoff into lakes causes algae overgrowth. Dead zones in oceans due to hypoxia (low oxygen).", tags: ["eutrophication", "algae", "nutrients", "oxygen depletion"] },
                    { name: "Biomagnification", definition: "Biomagnification is the increasing concentration of toxins at higher levels of the food chain.", example: "<strong>Example:</strong> DDT concentration increases from plankton → small fish → large fish → birds. Top predators most affected.", tags: ["biomagnification", "toxin", "food chain", "DDT"] },
                    { name: "Sustainable Development", definition: "Sustainable development meets present needs without compromising the ability of future generations to meet theirs.", example: "<strong>Example:</strong> Using renewable energy, recycling waste, water conservation, and afforestation are sustainable practices.", tags: ["sustainable", "future", "renewable", "conservation"] }
                ]
            },
            {
                chapter: "Everyday Chemistry",
                icon: "fa-house",
                topics: [
                    { name: "Soap and Detergent", definition: "Soaps are sodium/potassium salts of fatty acids. Detergents are synthetic surfactants effective in hard water.", example: "<strong>Example:</strong> Bathing soap (sodium stearate). Washing powder (detergent). Soap scum forms in hard water; detergents don't.", tags: ["soap", "detergent", "cleaning", "hard water"] },
                    { name: "Hard Water", definition: "Hard water contains dissolved calcium and magnesium salts, which reduce soap lathering.", example: "<strong>Example:</strong> Borewell water is often hard. Boiling removes temporary hardness. Washing soda or ion exchangers soften water.", tags: ["hard water", "calcium", "magnesium", "soap scum"] },
                    { name: "Bleaching Powder", definition: "Bleaching powder (CaOCl₂) releases chlorine for disinfection and bleaching action.", example: "<strong>Example:</strong> Used for disinfecting drinking water. Bleaching cotton and linen. Sanitizing swimming pools.", tags: ["bleach", "chlorine", "disinfect", "CaOCl2"] },
                    { name: "Fermentation", definition: "Fermentation is the chemical breakdown of sugars by microorganisms (yeast/bacteria) to produce alcohol or acids.", example: "<strong>Example:</strong> Yeast ferments sugar → ethanol + CO₂ (bread, wine). Bacteria ferment milk → yogurt/curd (lactic acid).", tags: ["fermentation", "yeast", "alcohol", "curd"] },
                    { name: "Food Preservation", definition: "Food preservation prevents spoilage using chemical preservatives, salt, sugar, oil, or refrigeration.", example: "<strong>Example:</strong> Sodium benzoate in jams. Salt in pickles. Sugar in jams. Vinegar pickling. Vacuum packing.", tags: ["preservation", "food", "salt", "sugar", "chemical"] },
                    { name: "Corrosion Inhibitors", definition: "Corrosion inhibitors are chemicals that reduce the rate of metal corrosion when added to the environment.", example: "<strong>Example:</strong> Anti-rust paints. Chromate coatings. VCI (Vapor Corrosion Inhibitor) paper for metal storage.", tags: ["inhibitor", "corrosion", "anti-rust", "protective"] },
                    { name: "Water Softening", definition: "Water softening removes calcium and magnesium ions, making water suitable for washing and industrial use.", example: "<strong>Example:</strong> Ion exchange resins replace Ca²⁺/Mg²⁺ with Na⁺. Washing soda precipitates Ca²⁺ as CaCO₃.", tags: ["softening", "ion exchange", "hardness", "washing soda"] },
                    { name: "pH of Soil", definition: "Soil pH affects nutrient availability. Most plants grow best in pH 6.0-7.5 (slightly acidic to neutral).", example: "<strong>Example:</strong> Lime (CaO) added to acidic soil raises pH. Gypsum added to alkaline soil lowers pH. Tea grows in acidic soil.", tags: ["soil", "pH", "lime", "gypsum", "agriculture"] },
                    { name: "Photochemistry", definition: "Photochemistry studies chemical reactions triggered by light. Photosynthesis and photography are examples.", example: "<strong>Example:</strong> Photosynthesis: 6CO₂ + 6H₂O + light → C₆H₁₂O₆ + 6O₂. Silver halides in photographic film darken on light exposure.", tags: ["photochemistry", "light", "photosynthesis", "photography"] },
                    { name: "Electrochemistry Basics", definition: "Electrochemistry deals with chemical reactions that produce electricity or are caused by electricity.", example: "<strong>Example:</strong> Batteries convert chemical energy to electrical. Electrolysis uses electricity to drive chemical reactions (water → H₂ + O₂).", tags: ["electrochemistry", "battery", "electrolysis", "energy"] }
                ]
            }
        ];

        let currentSort = 'chapter';
        let collapsedChapters = new Set();

        function renderTopics(data) {
            const container = document.getElementById('topicsContainer');
            container.innerHTML = '';

            data.forEach((chapter, chapterIndex) => {
                const section = document.createElement('div');
                section.className = 'chapter-section';
                if (collapsedChapters.has(chapterIndex)) {
                    section.classList.add('collapsed');
                }

                section.innerHTML = `
                    <div class="chapter-header" onclick="toggleChapter(${chapterIndex})">
                        <div class="chapter-icon">
                            <i class="fas ${chapter.icon}"></i>
                        </div>
                        <div class="chapter-info">
                            <div class="chapter-name">${chapter.chapter}</div>
                            <div class="chapter-count">${chapter.topics.length} topics</div>
                        </div>
                        <i class="fas fa-chevron-down chapter-toggle"></i>
                    </div>
                    <div class="topics-grid">
                        ${chapter.topics.map(topic => `
                            <div class="topic-card" data-chapter="${chapterIndex}" data-name="${topic.name.toLowerCase()}" data-tags="${topic.tags.join(' ')}" data-def="${topic.definition.toLowerCase()}">
                                <div class="topic-name">${topic.name}</div>
                                <div class="topic-definition">${topic.definition}</div>
                                <div class="topic-example">${topic.example}</div>
                                <div class="topic-tags">
                                    ${topic.tags.map(tag => `<span class="topic-tag">#${tag}</span>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;

                container.appendChild(section);
            });

            updateVisibleCount();
        }

        function toggleChapter(index) {
            if (collapsedChapters.has(index)) {
                collapsedChapters.delete(index);
            } else {
                collapsedChapters.add(index);
            }
            
            const sections = document.querySelectorAll('.chapter-section');
            if (sections[index]) {
                sections[index].classList.toggle('collapsed');
            }
        }

        function filterTopics() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.topic-card');
            const sections = document.querySelectorAll('.chapter-section');
            let visibleCount = 0;

            sections.forEach(section => {
                let chapterHasVisible = false;
                const sectionCards = section.querySelectorAll('.topic-card');
                
                sectionCards.forEach(card => {
                    const name = card.dataset.name;
                    const tags = card.dataset.tags;
                    const def = card.dataset.def;
                    
                    if (searchTerm === '' || 
                        name.includes(searchTerm) || 
                        tags.includes(searchTerm) || 
                        def.includes(searchTerm)) {
                        card.style.display = '';
                        chapterHasVisible = true;
                        visibleCount++;
                    } else {
                        card.style.display = 'none';
                    }
                });

                if (searchTerm === '') {
                    section.style.display = '';
                } else {
                    section.style.display = chapterHasVisible ? '' : 'none';
                    if (chapterHasVisible) {
                        section.classList.remove('collapsed');
                    }
                }
            });

            document.getElementById('visibleCount').textContent = visibleCount;
            document.getElementById('noResults').style.display = visibleCount === 0 ? 'block' : 'none';
        }

        function getAllTopicsCount() {
            return topicsData.reduce((total, chapter) => total + chapter.topics.length, 0);
        }

        function updateVisibleCount() {
            const visibleCards = document.querySelectorAll('.topic-card[style*="display: none"]').length;
            const total = getAllTopicsCount();
            document.getElementById('visibleCount').textContent = total - visibleCards;
            document.getElementById('totalCount').textContent = total;
        }

        function toggleSort() {
            const btn = document.getElementById('sortBtn');
            const label = document.getElementById('sortLabel');
            
            if (currentSort === 'chapter') {
                currentSort = 'alphabetical';
                btn.classList.add('active');
                label.textContent = 'Sort: A to Z';
                sortAlphabetically();
            } else {
                currentSort = 'chapter';
                btn.classList.remove('active');
                label.textContent = 'Sort: By Chapter';
                renderTopics(topicsData);
                if (document.getElementById('searchInput').value.trim() !== '') {
                    filterTopics();
                }
            }
        }

        function sortAlphabetically() {
            let allTopics = [];
            topicsData.forEach(chapter => {
                chapter.topics.forEach(topic => {
                    allTopics.push({
                        ...topic,
                        chapterName: chapter.chapter,
                        chapterIcon: chapter.icon
                    });
                });
            });

            allTopics.sort((a, b) => a.name.localeCompare(b.name));

            const container = document.getElementById('topicsContainer');
            container.innerHTML = `
                <div class="chapter-section">
                    <div class="chapter-header">
                        <div class="chapter-icon">
                            <i class="fas fa-sort-alpha-down"></i>
                        </div>
                        <div class="chapter-info">
                            <div class="chapter-name">All Topics (A-Z)</div>
                            <div class="chapter-count">${allTopics.length} topics</div>
                        </div>
                        <i class="fas fa-chevron-down chapter-toggle"></i>
                    </div>
                    <div class="topics-grid">
                        ${allTopics.map(topic => `
                            <div class="topic-card" data-chapter="0" data-name="${topic.name.toLowerCase()}" data-tags="${topic.tags.join(' ')}" data-def="${topic.definition.toLowerCase()}">
                                <div class="topic-name">${topic.name} <span style="font-size:11px;color:#7EDDD6;">(${topic.chapterName})</span></div>
                                <div class="topic-definition">${topic.definition}</div>
                                <div class="topic-example">${topic.example}</div>
                                <div class="topic-tags">
                                    ${topic.tags.map(tag => `<span class="topic-tag">#${tag}</span>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            updateVisibleCount();
        }

        function goBack() {
            document.body.style.transition = 'opacity 0.4s';
            document.body.style.opacity = '0';
            setTimeout(() => {
                window.location.href = '8_learning.html';
            }, 400);
        }

        function goHome() {
            document.body.style.transition = 'opacity 0.4s';
            document.body.style.opacity = '0';
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 400);
        }

        window.addEventListener('load', () => {
            renderTopics(topicsData);
            document.getElementById('totalCount').textContent = getAllTopicsCount();
            document.getElementById('visibleCount').textContent = getAllTopicsCount();

            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && document.activeElement !== document.getElementById('searchInput')) {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
            });
        });
    </script>
</body>
</html>
